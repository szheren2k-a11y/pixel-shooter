
<style>
*{box-sizing:border-box;margin:0;padding:0}
#gw{display:flex;flex-direction:column;align-items:center;padding:1rem 0;font-family:monospace}
#topbar{display:flex;gap:8px;margin-bottom:5px;font-size:12px;color:#aaa;flex-wrap:wrap;justify-content:center;align-items:center}
#topbar span{color:#FFE066;font-weight:500}
#hpbar-wrap{display:flex;align-items:center;gap:5px}
#hpbar-bg{width:110px;height:10px;background:#2a0a0a;border:1px solid #5a1a1a;border-radius:3px;overflow:hidden}
#hpbar-fill{height:100%;border-radius:2px;transition:width 0.2s}
#hpbar-txt{font-size:11px;color:#FF6B6B;min-width:38px}
#tabs{display:flex;margin-bottom:7px}
.tab{padding:5px 13px;font-size:12px;font-family:monospace;cursor:pointer;background:#111;color:#888;border:1px solid #333}
.tab.active{background:#1a1a2e;color:#7DF9AA;border-color:#7DF9AA}
canvas{border:1.5px solid #333;border-radius:4px;image-rendering:pixelated;background:#06061a;display:block;cursor:none}
#rightPanel{display:none;width:480px;background:#0a0a1a;border:1.5px solid #333;border-radius:4px;padding:12px;max-height:660px;overflow-y:auto}
#rightPanel.show{display:block}
.psec{color:#7DF9AA;font-size:11px;font-weight:500;margin:9px 0 5px;letter-spacing:1px;border-bottom:1px solid #1a2a1a;padding-bottom:2px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:4px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.sg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:5px}
.si{background:#111827;border:1px solid #2a2a4a;border-radius:5px;padding:6px;cursor:pointer;transition:border-color 0.15s}
.si:hover{border-color:#7DF9AA}.si.owned{border-color:#FFE066;opacity:0.6;cursor:default}
.si-ic{font-size:12px;margin-bottom:1px}.si-nm{color:#eee;font-size:11px;font-weight:500;margin-bottom:1px}
.si-ds{color:#555;font-size:9px;margin-bottom:3px;line-height:1.3}.si-pr{color:#FFE066;font-size:11px}
.si-lv{color:#7DF9AA;font-size:9px;float:right}
.gs{border:1px solid #2a2a4a;border-radius:5px;padding:6px;min-height:60px;cursor:pointer;transition:border-color 0.15s}
.gs:hover{border-color:#555}.gs.empty{opacity:0.3}
.gs .gr{font-size:9px;font-weight:500;margin-bottom:1px}.gs .gn{font-size:10px;font-weight:500;margin-bottom:1px}.gs .gst{font-size:9px;color:#777;line-height:1.3}
.mc{background:#0d1117;border:1px solid #222;border-radius:6px;padding:8px;margin-bottom:5px}
.mc.act{border-color:#7DF9AA;background:#0a1a0f}
.rb{background:#0d1117;border:1px solid #1a1a1a;border-radius:5px;padding:7px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.msg-toast{position:absolute;top:44px;left:50%;transform:translateX(-50%);background:#1a2a3a;color:#7DF9AA;padding:4px 11px;border-radius:4px;font-size:11px;pointer-events:none;opacity:0;transition:opacity 0.2s;white-space:nowrap;z-index:10}
#gameArea{position:relative;display:inline-block}
#ctrls{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
button{padding:5px 16px;font-size:12px;font-family:monospace;cursor:pointer}
#msg2{margin-top:4px;font-size:10px;color:#444;text-align:center}
#waveBanner{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#FFE066;font-size:17px;font-family:monospace;font-weight:bold;pointer-events:none;opacity:0;transition:opacity 0.4s;text-align:center;line-height:1.6}
#skipBar{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#skipBar.show{display:flex}
</style>

<div id="gw">
  <div id="topbar">
    <div id="hpbar-wrap">
      <span style="color:#FF6B6B">HP</span>
      <div id="hpbar-bg"><div id="hpbar-fill" style="width:100%"></div></div>
      <span id="hpbar-txt">100/100</span>
    </div>
    金:<span id="tc">0</span> 分:<span id="sc">0</span> 最高:<span id="hi">0</span> 波:<span id="wv">1</span>
    <span id="pBadge" style="color:#c084fc;display:none">✦<span id="pCnt">0</span></span>
  </div>
  <div id="tabs">
    <div class="tab active" id="tab-game" onclick="switchTab('game')">游戏</div>
    <div class="tab" id="tab-minion" onclick="switchTab('minion')">仆从</div>
    <div class="tab" id="tab-gear" onclick="switchTab('gear')">装备</div>
    <div class="tab" id="tab-shop" onclick="switchTab('shop')">商店</div>
  </div>
  <div id="gameArea">
    <canvas id="c" width="480" height="640"></canvas>
    <div class="msg-toast" id="toast"></div>
    <div id="waveBanner"></div>
    <div id="skipBar">
      <div style="color:#FFE066;font-size:20px;font-weight:bold;margin-bottom:12px">⚡ 快速跳关中</div>
      <div style="color:#aaa;font-size:13px;margin-bottom:16px" id="skipText">跳至波次...</div>
      <div style="width:320px;height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden"><div id="skipProg" style="height:100%;background:#FFE066;border-radius:4px;transition:width 0.05s;width:0%"></div></div>
      <div style="color:#555;font-size:10px;margin-top:8px" id="skipReward"></div>
    </div>
  </div>
  <div id="rightPanel"></div>
  <div id="ctrls">
    <button id="btn" onclick="startGame()">开始游戏</button>
    <button onclick="switchTab('minion')">仆从抽卡</button>
    <button onclick="switchTab('shop')">商店/扫荡</button>
  </div>
  <div id="msg2">鼠标跟随 | 自动射击 | 空格冲刺</div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=480,H=640;

// ── 持久数据 ──
const P={prestige:0,pBonus:1,allScore:0,best:0,clearedWave:0};

// ── 每局 ──
let G={state:'idle',score:0,gold:0,wave:1,hp:100,maxHp:100,shield:0,frame:0,lt:0,mx:W/2,my:H-70,sCool:0,dCool:0,dActive:0,wState:'pause',wPause:40,wLeft:0,wTotal:0,autoSell:1,sTimer:0};
let PL={x:W/2,y:H-70,inv:0,wf:0,dir:1};
let stars=[],stars2=[],pBullets=[],eBullets=[],enemies=[],parts=[],drops=[];
let waveQueue=[],spawnTimer=0;

// ── 品质 ──
const RAR=[
  {n:'普通',c:'#ccc',b:'#888',bg:'#181818'},
  {n:'优秀',c:'#4ade80',b:'#16a34a',bg:'#0a1a0a'},
  {n:'精良',c:'#60a5fa',b:'#2563eb',bg:'#0a0e18'},
  {n:'史诗',c:'#c084fc',b:'#7c3aed',bg:'#110a1a'},
  {n:'传说',c:'#fb923c',b:'#ea580c',bg:'#180a00'},
];
const GTYPES=['武器','护甲','头盔','饰品'];
let bag=[],eq={武器:null,护甲:null,头盔:null,饰品:null};

// ── 套装 ──
const SUITS={
  '爆炸套':{slots:['武器','护甲'],desc:'击杀触发AOE爆炸',color:'#fb923c'},
  '回血套':{slots:['头盔','饰品'],desc:'每5秒回3%HP',color:'#4ade80'},
  '护盾套':{slots:['护甲','头盔'],desc:'受伤后获3护盾',color:'#60a5fa'},
  '暴击套':{slots:['武器','饰品'],desc:'暴击率+30%伤害x2',color:'#FFE066'},
};
let sRegen=0;
function SA(name){return SUITS[name].slots.filter(t=>eq[t]&&eq[t].suit===name).length>=2;}

// ── 仆从系统：抽卡获得，5阶品质 ──
// 每种仆从有 rarity(0-4)，影响基础强度
// 共4种类型，同类型可叠加稀有度（保留最高品质）
const MINION_TYPES=['archer','knight','mage','healer'];
const MINION_META={
  archer:{n:'弓箭手',icon:'↑',baseCol:'#4ade80',desc:'追踪射击，随品质发射更多箭矢并留下爆炸余迹'},
  knight:{n:'骑士',icon:'⊕',baseCol:'#60a5fa',desc:'护盾守护，随品质提供更多护盾并对周围敌人造成伤害'},
  mage:{n:'法师',icon:'★',baseCol:'#c084fc',desc:'AOE魔法，随品质范围更大、伤害更高、留下魔法阵'},
  healer:{n:'牧师',icon:'✚',baseCol:'#fb923c',desc:'神圣回复，随品质回血更多并释放治愈光环'},
};
// 玩家仆从槽（最多同时出战2个）
let mSlots={archer:-1,knight:-1,mage:-1,healer:-1}; // -1=没有, 0-4=品质
let mCool={archer:0,knight:0,mage:0,healer:0};
let mActive=[]; // 最多2个出战

// 仆从抽卡：消耗金币，随机获得类型+品质
const GACHA_COST=[100,400,1500]; // 单抽/五连/十连
const GACHA_WEIGHTS=[40,30,18,9,3]; // 普通/优秀/精良/史诗/传说

function doGacha(n){
  const cost=[100,400,1500][n===1?0:n===5?1:2];
  if(G.gold<cost){toast('金币不足');return;}
  G.gold-=cost;
  const got=[];
  const cnt=n===1?1:n===5?5:10;
  for(let i=0;i<cnt;i++){
    const type=MINION_TYPES[Math.floor(Math.random()*4)];
    let r=Math.random()*100,ri=0;
    const cum=[40,70,88,97,100];
    for(let j=0;j<5;j++){if(r<cum[j]){ri=j;break;}}
    got.push({type,ri});
    if(mSlots[type]<ri)mSlots[type]=ri;
  }
  const best=got.reduce((a,b)=>b.ri>a.ri?b:a);
  toast('抽到 '+got.length+' 张 | 最高: '+RAR[best.ri].n+' '+MINION_META[best.type].n);
  updHUD();renderMinion();
}

function minionColor(type){
  const ri=mSlots[type];if(ri<0)return '#333';
  return RAR[ri].c;
}
function minionCooldown(type){
  const ri=Math.max(0,mSlots[type]);
  const base={archer:45,knight:160,mage:110,healer:130};
  return Math.max(12,base[type]-ri*18);
}

// 仆从行动（随品质升级特效）
function minionAct(type,mx,my){
  const ri=mSlots[type];if(ri<0)return;
  const lv=ri; // 品质即等级
  if(type==='archer'){
    if(!enemies.length)return;
    const t=enemies.reduce((a,b)=>a.y>b.y?a:b);
    const dx=t.x-mx,dy=t.y-my,d=Math.hypot(dx,dy);
    const arrows=1+lv+(lv>=3?2:0); // 传说7箭
    const dmg=getAtk()*(3+lv*2.5);
    const spread=lv*0.06;
    for(let i=0;i<arrows;i++){
      const ang=(i-(arrows-1)/2)*spread;
      const vx=dx/d*13*Math.cos(ang)-dy/d*13*Math.sin(ang);
      const vy=dy/d*13*Math.cos(ang)+dx/d*13*Math.sin(ang);
      pBullets.push({x:mx,y:my,vx,vy,dmg,crit:0.15+lv*0.05,critDmg:1.6+lv*0.2,pierce:lv>=4?3:lv>=2?1:0,ph:0,col:RAR[ri].c,trail:lv>=2,aoe:lv>=4?40:0});
    }
    // 品质3+: 发射后在仆从位置生成爆炸粒子
    if(lv>=3)for(let i=0;i<16;i++)parts.push({x:mx,y:my,vx:(Math.random()-0.5)*7,vy:(Math.random()-0.5)*7,life:0.8,color:RAR[ri].c,size:3+lv,txt:null,glow:true});
  } else if(type==='knight'){
    const shield=2+lv*3;G.shield=Math.min(G.shield+shield,(2+lv*3)*2);
    if(lv>=1){// 品质1+：震荡波伤害周围敌人
      const range=60+lv*30;const dmg=getAtk()*(2+lv*3);
      enemies.forEach(e=>{if(Math.hypot(e.x-PL.x,e.y-PL.y)<range){e.hp-=dmg;spawnParts(e.x,e.y,RAR[ri].c,5);}});
      for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,r2=Math.random()*range;parts.push({x:PL.x+Math.cos(a)*r2,y:PL.y+Math.sin(a)*r2,vx:Math.cos(a)*2,vy:Math.sin(a)*2,life:0.7,color:RAR[ri].c,size:4,txt:null,glow:lv>=3});}
    }
    toast('护盾 +'+shield+(lv>=1?' 震荡波':''));
    if(lv>=3){// 品质3+：自身短暂无敌
      PL.inv=Math.max(PL.inv,30+lv*10);
    }
  } else if(type==='mage'){
    if(!enemies.length)return;
    const t=enemies.reduce((a,b)=>a.y>b.y?a:b);
    const dx=t.x-mx,dy=t.y-my,d=Math.hypot(dx,dy);
    const aoe=70+lv*25;const dmg=getAtk()*(8+lv*6);
    const count=1+(lv>=2?1:0)+(lv>=4?1:0);
    for(let k=0;k<count;k++){
      const ang=k*(Math.PI*2/count);
      const vx2=dx/d*7*Math.cos(ang)-dy/d*7*Math.sin(ang);
      const vy2=dy/d*7*Math.cos(ang)+dx/d*7*Math.sin(ang);
      pBullets.push({x:mx,y:my,vx:vx2,vy:vy2,dmg,crit:0.2+lv*0.05,critDmg:2+lv*0.3,pierce:99,ph:0,col:RAR[ri].c,aoe,big:true,magicRing:lv>=3});
    }
    // 品质2+: 在身边生成魔法阵
    if(lv>=2)for(let i=0;i<24;i++){const a=i/24*Math.PI*2;parts.push({x:mx+Math.cos(a)*(30+lv*10),y:my+Math.sin(a)*(30+lv*10),vx:Math.cos(a)*0.5,vy:Math.sin(a)*0.5,life:1.2,color:RAR[ri].c,size:3,txt:null,glow:true});}
  } else if(type==='healer'){
    const missing=G.maxHp-G.hp;const base=8+lv*8;
    const heal=lv>=2?base+missing*0.05*(lv-1):base;
    G.hp=Math.min(G.maxHp,G.hp+heal);
    // 治愈光环视效
    for(let i=0;i<(8+lv*6);i++){const a=Math.random()*Math.PI*2,r2=Math.random()*(40+lv*20);parts.push({x:PL.x+Math.cos(a)*r2,y:PL.y+Math.sin(a)*r2,vx:0,vy:-1.5-lv*0.5,life:1+lv*0.2,color:RAR[ri].c,size:3+lv,txt:null,glow:true});}
    if(lv>=3)parts.push({x:PL.x,y:PL.y,vx:0,vy:-0.5,life:1.5,color:RAR[ri].c,size:2,txt:'+'+Math.round(heal)+' HP'});
    else toast('+'+Math.round(heal)+'HP');
    if(lv>=4){// 传说：清除敌方子弹
      const r2=80+lv*20;eBullets=eBullets.filter(b=>Math.hypot(b.x-PL.x,b.y-PL.y)>r2);
    }
  }
}

// ── 装备 ──
function rollGear(minR=0,wave=1){
  // 波次越高爆率越好
  const waveBoost=Math.floor(wave/5);
  const w=[Math.max(5,30-waveBoost*3),Math.max(5,28-waveBoost*2),20+waveBoost,12+waveBoost*2,8+waveBoost*3];
  let r=Math.random()*w.reduce((a,b)=>a+b,0),ri=0;
  for(let i=0;i<w.length;i++){r-=w[i];if(r<=0){ri=i;break;}}
  ri=Math.max(ri,minR);
  const type=GTYPES[Math.floor(Math.random()*4)];
  const pools={武器:['攻击','暴击率','暴击伤害','射速'],护甲:['防御','最大HP','格挡'],头盔:['最大HP','防御','攻击'],饰品:['暴击率','攻击','最大HP','金币']};
  const n=1+Math.floor(ri/2)+Math.floor(Math.random()*2);
  const chosen=pools[type].sort(()=>Math.random()-0.5).slice(0,n);
  // 波次越高属性越高
  const wMult=1+wave*0.04;
  const base=(1+ri*0.6)*wMult;const stats={};
  chosen.forEach(s=>{stats[s]=Math.round((base+Math.random()*base*0.8)*(s==='暴击率'||s==='格挡'?5:s==='暴击伤害'?15:s==='最大HP'?20:s==='金币'?8:s==='射速'?1:4));});
  const suit=(ri>=2&&Math.random()<0.45)?Object.keys(SUITS)[Math.floor(Math.random()*4)]:null;
  const pfx=['锈蚀','古老','精锻','神圣','毁灭'][ri];
  const nms={武器:['破碎刃','星光枪','暗影炮','闪电矢','毁灭炮'],护甲:['铁皮甲','强化甲','精金甲','秘银甲'],头盔:['铁头盔','战士盔','英雄盔','传奇盔'],饰品:['护符','符文石','魔力环','命运石']};
  return{name:pfx+nms[type][Math.floor(Math.random()*nms[type].length)],type,rarity:ri,stats,suit,id:Math.random()};
}
function autoProcess(w=1){
  bag=bag.filter(g=>{if(g.rarity<G.autoSell){G.gold+=5+g.rarity*12;return false;}return true;});
  for(const t of GTYPES)for(let ri=0;ri<4;ri++){
    const same=bag.filter(g=>g.type===t&&g.rarity===ri);
    if(same.length>=3){same.slice(0,3).forEach(g=>bag=bag.filter(x=>x.id!==g.id));bag.push(rollGear(ri+1,w));toast('合成: '+RAR[ri].n+' x3 → '+RAR[ri+1].n);break;}
  }
}

// ── 升级 ──
const UPG={
  weapon:{fireRate:{n:'射速',d:'减少间隔',ic:'▶',c:80,lv:0,mx:6},damage:{n:'伤害',d:'+1基础',ic:'◆',c:100,lv:0,mx:5},multishot:{n:'散弹',d:'多发',ic:'»',c:150,lv:0,mx:4},pierce:{n:'穿透',d:'穿透敌人',ic:'→',c:200,lv:0,mx:3},crit:{n:'暴击',d:'+8%',ic:'!',c:160,lv:0,mx:5},missile:{n:'导弹',d:'追踪弹',ic:'★',c:250,lv:0,mx:3}},
  defense:{shield:{n:'护盾',d:'开局护盾',ic:'◇',c:150,lv:0,mx:4},extraLife:{n:'最大HP',d:'+30HP',ic:'♡',c:180,lv:0,mx:5},dash:{n:'冲刺',d:'空格无敌',ic:'»',c:180,lv:0,mx:4},armor:{n:'护甲',d:'减伤5%',ic:'⊕',c:200,lv:0,mx:5},deflect:{n:'偏转',d:'反弹子弹',ic:'↯',c:220,lv:0,mx:3}},
  passive:{scoreBoost:{n:'分数',d:'+20%/级',ic:'▲',c:110,lv:0,mx:5},magnet:{n:'磁铁',d:'自动吸收',ic:'◈',c:120,lv:0,mx:3},aura:{n:'爆炸',d:'击杀爆炸',ic:'☼',c:180,lv:0,mx:3},regen:{n:'回血',d:'每波回血',ic:'✚',c:300,lv:0,mx:3}}
};
function AU(){return{...UPG.weapon,...UPG.defense,...UPG.passive};}
function uCost(k){const u=AU()[k];return Math.floor(u.c*Math.pow(1.65,u.lv));}
function gStat(s){let v=0;for(const g of Object.values(eq))if(g&&g.stats[s])v+=g.stats[s];return v;}
function getAtk(){return 1+gStat('攻击')/20+UPG.weapon.damage.lv;}
function getCrit(){let c=Math.min(0.85,(gStat('暴击率')/100)+UPG.weapon.crit.lv*0.08);if(SA('暴击套'))c=Math.min(0.95,c+0.3);return c;}
function getCritD(){let cd=1.5+(gStat('暴击伤害')/100);if(SA('暴击套'))cd*=2;return cd;}
function getDef(){return gStat('防御')/100+gStat('格挡')/150+UPG.defense.armor.lv*0.05;}
function getMxHp(){return 100+gStat('最大HP')+UPG.defense.extraLife.lv*30;}
function getFireI(){return Math.max(4,20-UPG.weapon.fireRate.lv*3-gStat('射速'));}
function getMS(){return 1+UPG.weapon.multishot.lv;}
function getPierce(){return UPG.weapon.pierce.lv;}
function getCoinB(){return(1+gStat('金币')/80)*P.pBonus;}
function getScoreB(){return(1+UPG.passive.scoreBoost.lv*0.2)*P.pBonus;}
function getDeflect(){return UPG.defense.deflect.lv*0.12;}
function presReq(){return 8000*Math.pow(2,P.prestige);}

// ── 跳关系统 ──
let skipDone=false;
function shouldSkip(){
  if(skipDone)return false;
  const target=Math.floor(P.clearedWave/5)*5+1;
  return target>1&&P.clearedWave>=5;
}
function getSkipTarget(){return Math.floor(P.clearedWave/5)*5+1;}

function runSkip(onDone){
  const target=getSkipTarget();
  const bar=document.getElementById('skipBar');
  const prog=document.getElementById('skipProg');
  const txt=document.getElementById('skipText');
  const rew=document.getElementById('skipReward');
  bar.className='show';
  let w=1,totalGold=0,totalScore=0;
  const steps=target-1;
  const interval=setInterval(()=>{
    if(w>=steps){clearInterval(interval);
      prog.style.width='100%';
      setTimeout(()=>{bar.className='';G.wave=target;G.wState='pause';G.wPause=40;onDone();},400);return;}
    w++;const prog2=Math.round((w-1)/steps*100);
    prog.style.width=prog2+'%';
    txt.textContent='跳关: 波次 '+w+' / '+target;
    const c=Math.round(w*12);const s=Math.round(w*30);
    totalGold+=c;totalScore+=s;G.gold+=c;G.score+=s;P.allScore+=s;
    // 每5波掉装备
    if(w%5===0){const g=rollGear(Math.min(3,Math.floor(w/8)),w);bag.push(g);}
    rew.textContent='+'+totalGold+'金 +'+Math.round(totalScore)+'分';
  },Math.max(20,600/steps));
}

const ET=[
  {n:'基础兵',w:24,h:18,hp:2,spd:0.6,sc:10,cn:5,col:'#FF6B6B',shape:'basic',sI:90,bSpd:2.8,bPat:'single'},
  {n:'突击兵',w:20,h:20,hp:3,spd:0.85,sc:20,cn:10,col:'#FF9F43',shape:'fighter',sI:65,bSpd:3.5,bPat:'aimed'},
  {n:'重装兵',w:30,h:24,hp:7,spd:0.32,sc:35,cn:20,col:'#a855f7',shape:'heavy',sI:48,bSpd:2.2,bPat:'spread'},
  {n:'狙击手',w:16,h:26,hp:2,spd:0.38,sc:25,cn:15,col:'#10b981',shape:'sniper',sI:120,bSpd:6,bPat:'aimed'},
  {n:'BOSS',w:52,h:40,hp:40,spd:0.22,sc:300,cn:120,col:'#FFE066',shape:'boss',sI:30,bSpd:3,bPat:'boss'},
];

function wDiff(w){return 1+Math.pow(w-1,0.65)*0.6;}
function buildQ(){
  const q=[];
  if(G.wave%5===0){const b={...ET[4]};b.hp=Math.round(b.hp*Math.pow(1.5,Math.floor(G.wave/5)));b.maxHp=b.hp;q.push(b);return q;}
  const diff=wDiff(G.wave);
  const avail=Math.min(4,1+Math.floor((G.wave-1)/2));
  const pool=ET.slice(0,avail);
  const total=Math.round((6+G.wave*3)*diff*0.55);
  for(let i=0;i<total;i++){const t={...pool[Math.floor(Math.random()*pool.length)]};t.hp=Math.round(t.hp*diff);t.maxHp=t.hp;t.spd*=(1+G.wave*0.05);q.push(t);}
  return q.sort(()=>Math.random()-0.5);
}
function spawnE(t){const ex=t.w/2+4+Math.random()*(W-t.w-8);enemies.push({...t,x:ex,y:-t.h/2-8,shootTimer:Math.floor(Math.random()*t.sI),dx:(Math.random()-0.5)*0.45,mvPh:Math.random()*Math.PI*2,id:Math.random()});}
function fireE(e){
  const sp=e.bSpd*(1+G.wave*0.025);
  if(e.bPat==='single')eBullets.push({x:e.x,y:e.y+e.h/2,vx:0,vy:sp,color:e.col,r:3});
  else if(e.bPat==='aimed'){const dx=PL.x-e.x,dy=PL.y-e.y,d=Math.hypot(dx,dy);eBullets.push({x:e.x,y:e.y,vx:dx/d*sp,vy:dy/d*sp,color:e.col,r:3});}
  else if(e.bPat==='spread')[-0.38,0,0.38].forEach(a=>eBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.sin(a)*sp,vy:Math.cos(a)*sp,color:e.col,r:4}));
  else if(e.bPat==='boss'){
    [-0.5,-0.25,0,0.25,0.5].forEach(a=>eBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.sin(a)*sp,vy:Math.cos(a)*sp,color:'#FFE066',r:4}));
    if(G.frame%160<80){const dx=PL.x-e.x,dy=PL.y-e.y,d=Math.hypot(dx,dy);eBullets.push({x:e.x,y:e.y,vx:dx/d*5,vy:dy/d*5,color:'#FF6B6B',r:5});}
    if(G.frame%280<140){for(let i=0;i<8;i++){const a=i*Math.PI/4+G.frame*0.02;eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*sp*0.8,vy:Math.sin(a)*sp*0.8,color:'#c084fc',r:3});}}
  }
}
function drawE(e){
  const{x,y,w,h,hp:eh,maxHp:em,shape,col}=e,hr=eh/em;
  if(shape==='boss'){
    const p=Math.sin(G.frame*0.08)*3;ctx.fillStyle=`hsl(${G.frame*2%360},75%,48%)`;ctx.fillRect(Math.round(x-w/2),Math.round(y-h/2-p),w,h+p*2);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(Math.round(x-w/2),Math.round(y-h/2-p),w,4);
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText('BOSS',x,y+4);
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(Math.round(x-w/2),Math.round(y+h/2+4),w,6);
    ctx.fillStyle=hr>0.5?'#4ade80':hr>0.25?'#FFE066':'#FF6B6B';ctx.fillRect(Math.round(x-w/2),Math.round(y+h/2+4),Math.round(w*hr),6);
  }else{
    ctx.fillStyle=col;
    if(shape==='fighter'){ctx.beginPath();ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y+h/2);ctx.lineTo(x-w/2,y+h/2);ctx.closePath();ctx.fill();}
    else ctx.fillRect(Math.round(x-w/2),Math.round(y-h/2),w,h);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(Math.round(x-w/2),Math.round(y-h/2),w,3);
    if(hr<1){ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(Math.round(x-w/2),Math.round(y+h/2+2),w,3);ctx.fillStyle='#7DF9AA';ctx.fillRect(Math.round(x-w/2),Math.round(y+h/2+2),Math.round(w*hr),3);}
  }
}
function drawDrop(d){
  const rc=RAR[d.rarity].c,p=Math.sin(G.frame*0.15+d.phase)*2;
  ctx.fillStyle=rc+'33';ctx.fillRect(Math.round(d.x-10),Math.round(d.y-10+p*0.1),20,20);
  ctx.strokeStyle=rc;ctx.lineWidth=1.5;ctx.strokeRect(Math.round(d.x-10),Math.round(d.y-10+p*0.1),20,20);
  ctx.fillStyle=rc;ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('⬡',d.x,d.y+4+p*0.1);
}

// ── 主循环 ──
function loop(ts){
  if(G.state!=='playing')return;
  const dt=Math.min((ts-G.lt)/16.67,3);G.lt=ts;G.frame++;

  if(SA('回血套')){sRegen+=dt;if(sRegen>300){sRegen=0;G.hp=Math.min(G.maxHp,G.hp+Math.round(G.maxHp*0.03));}}

  PL.x+=(G.mx-PL.x)*0.92*dt;PL.y+=(G.my-PL.y)*0.92*dt;
  const dx0=G.mx-PL.x,dy0=G.my-PL.y;
  if(Math.abs(dx0)>1||Math.abs(dy0)>1){PL.wf+=dt*2;PL.dir=dx0>=0?1:-1;}
  PL.x=Math.max(14,Math.min(W-14,PL.x));PL.y=Math.max(20,Math.min(H-20,PL.y));
  if(PL.inv>0)PL.inv-=dt;if(G.dActive>0)G.dActive-=dt;if(G.dCool>0)G.dCool-=dt;

  if(G.sCool<=0&&enemies.length>0){
    const n=getMS(),sp=9,off=(n-1)*sp/2;
    for(let i=0;i<n;i++)pBullets.push({x:PL.x-off+i*sp,y:PL.y-14,vx:0,vy:-10,dmg:getAtk(),crit:getCrit(),critDmg:getCritD(),pierce:getPierce(),ph:0,col:null});
    if(UPG.weapon.missile.lv>0&&G.frame%Math.max(25,52-UPG.weapon.missile.lv*8)===0){
      const tgt=enemies.reduce((a,b)=>a.y>b.y?a:b,enemies[0]);
      if(tgt)pBullets.push({x:PL.x,y:PL.y-14,vx:0,vy:-7,dmg:getAtk()*2.5,crit:getCrit(),critDmg:getCritD(),pierce:0,ph:0,missile:true,tid:tgt.id,col:'#c084fc'});
    }
    G.sCool=getFireI();
  }
  if(G.sCool>0)G.sCool-=dt;

  pBullets=pBullets.filter(b=>{
    if(b.missile){const t=enemies.find(e=>e.id===b.tid);if(t){const dx=t.x-b.x,dy=t.y-b.y,d=Math.hypot(dx,dy);if(d>4){b.vx+=(dx/d*0.45-b.vx)*0.18;b.vy+=(dy/d*0.45-b.vy)*0.18;}}}
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.y<-20||b.y>H+20||b.x<-20||b.x>W+20)return false;
    let used=false;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(Math.abs(b.x-e.x)<e.w/2+2&&Math.abs(b.y-e.y)<e.h/2+2){
        const ic=Math.random()<b.crit;const dmg=Math.round(b.dmg*(ic?b.critDmg:1));
        e.hp-=dmg;spawnParts(b.x,b.y,ic?'#FFE066':e.col,ic?8:4);
        if(ic){parts.push({x:e.x,y:e.y-e.h/2-6,vx:0,vy:-1.2,life:0.9,color:'#FFE066',size:2,txt:'暴!'+dmg,glow:false});}
        if(b.aoe){const ar=b.aoe;enemies.forEach(oe=>{if(oe.id!==e.id&&Math.hypot(oe.x-e.x,oe.y-e.y)<ar){oe.hp-=dmg*0.5;spawnParts(oe.x,oe.y,b.col||'#c084fc',4);}});spawnParts(e.x,e.y,b.col||'#c084fc',10);}
        if(e.hp<=0){killE(e,i);if(b.pierce<=0||b.ph>=b.pierce){used=true;break;}b.ph++;}
        else if(b.pierce<=0){used=true;break;}
      }
    }
    return !used;
  });

  function killE(e,idx){
    spawnParts(e.x,e.y,e.col,e.shape==='boss'?40:16);
    if(SA('爆炸套')){enemies.forEach(oe=>{if(oe.id!==e.id&&Math.hypot(oe.x-e.x,oe.y-e.y)<70){oe.hp-=getAtk()*3;spawnParts(oe.x,oe.y,'#fb923c',5);}});}
    const ec=Math.round(e.cn*getCoinB());G.gold+=ec;G.score+=Math.round(e.sc*getScoreB());P.allScore+=e.sc;G.wLeft--;
    if(e.shape==='boss'){
      P.clearedWave=Math.max(P.clearedWave,G.wave);
      const ri=Math.min(4,Math.floor(G.wave/5)+2);
      const g=rollGear(ri,G.wave);drops.push({...g,x:e.x,y:e.y,phase:Math.random()*Math.PI*2,vy:0.8});
      toast('BOSS! '+RAR[g.rarity].n+' '+g.name);
      if(SA('护盾套'))G.shield+=3;
    }else if(Math.random()<0.09+G.wave*0.003){drops.push({...rollGear(0,G.wave),x:e.x,y:e.y,phase:Math.random()*Math.PI*2,vy:1});}
    if(UPG.passive.aura.lv>0)eBullets=eBullets.filter(b=>Math.hypot(b.x-e.x,b.y-e.y)>55);
    enemies.splice(idx,1);
  }

  enemies.forEach(e=>{
    e.y+=e.spd*dt;
    if(e.shape==='boss'){e.x+=Math.sin(G.frame*0.015+e.mvPh)*1.5*dt;e.x=Math.max(e.w/2+4,Math.min(W-e.w/2-4,e.x));}
    else{e.x+=e.dx*dt;if(e.x<e.w/2+4||e.x>W-e.w/2-4)e.dx*=-1;}
    e.shootTimer-=dt;if(e.shootTimer<=0){fireE(e);e.shootTimer=e.sI*(0.75+Math.random()*0.4);}
    if(e.y>H+30){G.wLeft--;enemies.splice(enemies.indexOf(e),1);}
  });

  const mag=UPG.passive.magnet.lv*85;
  drops=drops.filter(d=>{
    d.y+=d.vy*dt;if(d.y>H+30)return false;
    if(mag>0){const ddx=PL.x-d.x,ddy=PL.y-d.y,dd=Math.hypot(ddx,ddy);if(dd<mag){d.x+=ddx/dd*3.5*dt;d.y+=ddy/dd*3.5*dt;}}
    if(Math.abs(d.x-PL.x)<18&&Math.abs(d.y-PL.y)<18){bag.push({name:d.name,type:d.type,rarity:d.rarity,stats:d.stats,suit:d.suit,id:d.id});autoProcess(G.wave);toast(RAR[d.rarity].n+' '+d.name);spawnParts(d.x,d.y,RAR[d.rarity].c,10);return false;}
    return true;
  });

  if(PL.inv<=0&&G.dActive<=0){
    eBullets=eBullets.filter(b=>{
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+10)return false;
      if(Math.abs(b.x-PL.x)<10&&Math.abs(b.y-PL.y)<14){
        if(Math.random()<getDeflect()){pBullets.push({x:b.x,y:b.y,vx:0,vy:-9,dmg:getAtk(),crit:getCrit(),critDmg:getCritD(),pierce:0,ph:0,col:'#54A0FF'});spawnParts(b.x,b.y,'#54A0FF',4);return false;}
        if(G.shield>0){G.shield--;spawnParts(b.x,b.y,'#54A0FF',6);PL.inv=40;toast('护盾！');return false;}
        const raw=b.r?b.r*3:10,red=Math.round(raw*(1-getDef()));
        G.hp-=red;spawnParts(PL.x,PL.y,'#FF6B6B',8);PL.inv=80;
        if(SA('护盾套')&&G.shield===0)G.shield=3;
        updHUD();if(G.hp<=0){endGame();return false;}toast('-'+red+'HP');return false;
      }
      return true;
    });
  }else{eBullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;});eBullets=eBullets.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);}

  // 波次（加快节奏：直接全部入场，间隔更短）
  if(G.wState==='spawning'){
    spawnTimer-=dt;
    if(spawnTimer<=0&&waveQueue.length>0){
      const batchSz=G.wave%5===0?1:Math.min(3+Math.floor(G.wave/3),waveQueue.length);
      for(let i=0;i<batchSz&&waveQueue.length>0;i++)spawnE(waveQueue.shift());
      spawnTimer=G.wave%5===0?80:Math.max(8,32-G.wave*1.5);
    }
    if(waveQueue.length===0)G.wState='waiting';
  }
  if(G.wState==='waiting'&&enemies.length===0&&G.wLeft<=0){
    if(UPG.passive.regen.lv>0){G.hp=Math.min(getMxHp(),G.hp+UPG.passive.regen.lv*18);toast('回血+'+(UPG.passive.regen.lv*18));}
    const bon=Math.round(G.wave*130*wDiff(G.wave));G.score+=bon;G.gold+=G.wave*22;
    if(G.score>P.best)P.best=G.score;
    showWaveBanner('波次 '+G.wave+' 清除！<br><span style="font-size:13px;color:#7DF9AA">+'+bon+'分</span>');
    G.wave++;updHUD();G.wState='pause';G.wPause=55;
  }
  if(G.wState==='pause'){G.wPause-=dt;if(G.wPause<=0){const q=buildQ();waveQueue=q;G.wTotal=q.length;G.wLeft=q.length;spawnTimer=20;G.wState='spawning';showWaveBanner('波次 '+G.wave+(G.wave%5===0?' ⚡BOSS':'')+'！');}}

  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.025;});parts=parts.filter(p=>p.life>0);

  drawBg(dt);drops.forEach(drawDrop);enemies.forEach(drawE);
  pBullets.forEach(b=>{
    if(b.missile){ctx.fillStyle='#c084fc';ctx.fillRect(Math.round(b.x-2),Math.round(b.y-6),5,10);return;}
    const wc=b.col||(eq['武器']?RAR[eq['武器'].rarity].c:'#7DF9AA');
    if(b.big){ctx.globalAlpha=0.7;ctx.fillStyle=wc;ctx.beginPath();ctx.arc(b.x,b.y,9,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle=wc;ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();}
    else{ctx.fillStyle=wc;ctx.fillRect(Math.round(b.x-2),Math.round(b.y-7),4,8);}
  });
  eBullets.forEach(b=>{ctx.fillStyle=b.color||'#FF6B6B';ctx.beginPath();ctx.arc(b.x,b.y,b.r||3,0,Math.PI*2);ctx.fill();});
  parts.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.txt){ctx.fillStyle=p.color;ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(p.txt,p.x,p.y);ctx.globalAlpha=1;return;}
    if(p.glow){ctx.shadowBlur=8;ctx.shadowColor=p.color;}
    ctx.fillStyle=p.color;ctx.fillRect(Math.round(p.x),Math.round(p.y),Math.round(p.size),Math.round(p.size));
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  });
  drawPlayer();

  const wD=G.wTotal-G.wLeft,wP=G.wTotal>0?Math.min(1,wD/G.wTotal):0;
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(6,6,W-12,5);
  ctx.fillStyle=G.wave%5===0?`hsl(${G.frame*3%360},80%,55%)`:'#378ADD';ctx.fillRect(6,6,Math.round((W-12)*wP),5);
  ctx.fillStyle='rgba(150,150,255,0.5)';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText('波次'+G.wave+'('+wD+'/'+G.wTotal+')',W-6,20);
  if(UPG.defense.dash.lv>0){const p=Math.max(0,1-G.dCool/100);ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(6,H-10,55,4);ctx.fillStyle=G.dCool<=0?'#FFE066':'#443300';ctx.fillRect(6,H-10,Math.round(55*p),4);ctx.fillStyle=G.dCool<=0?'#FFE066':'#555';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText('[空格]',63,H-7);}
  let sy=H-22;Object.entries(SUITS).forEach(([sn,sd])=>{if(SA(sn)){ctx.fillStyle=sd.color+'cc';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText('◈ '+sn,W-6,sy);sy-=12;}});
  ctx.strokeStyle='rgba(125,249,170,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(G.mx,G.my,6,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(G.mx-10,G.my);ctx.lineTo(G.mx+10,G.my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(G.mx,G.my-10);ctx.lineTo(G.mx,G.my+10);ctx.stroke();

  if(G.frame%28===0)updHUD();
  requestAnimationFrame(loop);
}

function endGame(){
  G.state='dead';if(G.score>P.best)P.best=G.score;
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FF6B6B';ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-50);
  ctx.fillStyle='#FFE066';ctx.font='14px monospace';ctx.fillText('分数: '+Math.round(G.score),W/2,H/2-16);
  ctx.fillStyle='#7DF9AA';ctx.font='12px monospace';ctx.fillText('金币: '+Math.round(G.gold)+'  波次: '+G.wave,W/2,H/2+6);
  ctx.fillStyle='#c084fc';ctx.font='11px monospace';ctx.fillText('累计: '+Math.round(P.allScore)+' / 转生: '+presReq(),W/2,H/2+26);
  document.getElementById('btn').textContent='再来一次';document.getElementById('btn').style.display='block';
  updHUD();
}

function startGame(){
  const savedAutoSell=G.autoSell||1;
  G={state:'playing',score:0,gold:0,wave:1,hp:0,maxHp:0,shield:UPG.defense.shield.lv,frame:0,lt:performance.now(),mx:W/2,my:H-70,sCool:0,dCool:0,dActive:0,wState:'pause',wPause:40,wLeft:0,wTotal:0,autoSell:savedAutoSell,sTimer:0};
  G.maxHp=getMxHp();G.hp=G.maxHp;
  sRegen=0;skipDone=false;
  waveQueue=[];spawnTimer=0;
  PL={x:W/2,y:H-70,inv:0,wf:0,dir:1};
  pBullets=[];eBullets=[];enemies=[];parts=[];drops=[];
  Object.keys(mCool).forEach(k=>mCool[k]=0);
  document.getElementById('btn').style.display='none';
  switchTab('game');updHUD();

  if(shouldSkip()){
    skipDone=true;
    runSkip(()=>{
      showWaveBanner('跳关至波次 '+G.wave+'！');
      requestAnimationFrame(loop);
    });
  }else{
    showWaveBanner('波次 1 开始！');
    requestAnimationFrame(loop);
  }
}

// ── UI ──
function switchTab(tab){
  ['game','minion','gear','shop'].forEach(t=>document.getElementById('tab-'+t).className='tab'+(t===tab?' active':''));
  canvas.style.display=tab==='game'?'block':'none';
  const rp=document.getElementById('rightPanel');rp.className=tab!=='game'?'rightPanel show':'rightPanel';
  if(tab==='minion')renderMinion();else if(tab==='gear')renderGear();else if(tab==='shop')renderShop();
}
function mkSec(par,txt){const s=document.createElement('div');s.className='psec';s.textContent=txt;par.appendChild(s);}

function renderMinion(){
  const rp=document.getElementById('rightPanel');rp.innerHTML='';
  mkSec(rp,'仆从抽卡（消耗金币，随机获得）');
  const gRow=document.createElement('div');gRow.style='display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap';
  [[1,100,'单抽'],[5,400,'五连'],[10,1500,'十连']].forEach(([n,cost,label])=>{
    const btn=document.createElement('button');
    btn.style=`font-size:11px;padding:5px 12px;color:${G.gold>=cost?'#FFE066':'#555'};border-color:${G.gold>=cost?'#664400':'#222'}`;
    btn.textContent=label+' ('+cost+'金)';btn.onclick=()=>{doGacha(n);};gRow.appendChild(btn);
  });
  rp.appendChild(gRow);

  // 品质说明
  const qrow=document.createElement('div');qrow.style='display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap';
  RAR.forEach(r=>{const d=document.createElement('div');d.style=`background:${r.bg};border:1px solid ${r.b};border-radius:4px;padding:2px 7px;font-size:10px;color:${r.c}`;d.textContent=r.n;qrow.appendChild(d);});
  rp.appendChild(qrow);

  mkSec(rp,'已拥有仆从（最多同时出战2个）');
  MINION_TYPES.forEach(type=>{
    const ri=mSlots[type];const owned=ri>=0;
    const isActive=mActive.includes(type);
    const md=MINION_META[type];
    const card=document.createElement('div');card.className='mc'+(isActive?' act':'');
    if(owned)card.style.borderColor=RAR[ri].b;
    card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:20px;color:${owned?RAR[ri].c:'#333'}">${md.icon}</span>
        <div>
          <div style="color:${owned?RAR[ri].c:'#444'};font-size:12px;font-weight:500">${md.n}${owned?' ['+RAR[ri].n+']':'  未获得'}${isActive?' <span style="color:#7DF9AA;font-size:9px">出战</span>':''}</div>
          <div style="color:#555;font-size:9px;margin-top:1px">${md.desc}</div>
          ${owned?`<div style="color:${RAR[ri].c};font-size:9px;margin-top:2px">品质加成: 冷却${minionCooldown(type)}帧 | 强度 x${(1+ri*0.8).toFixed(1)}</div>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        ${owned&&!isActive&&mActive.length<2?`<button onclick="toggleMinion('${type}')" style="padding:2px 8px;font-size:10px;color:#7DF9AA">出战</button>`:''}
        ${isActive?`<button onclick="toggleMinion('${type}')" style="padding:2px 8px;font-size:10px;color:#888">收回</button>`:''}
        ${!owned?`<div style="color:#333;font-size:9px;text-align:right">抽卡获得</div>`:''}
      </div>
    </div>`;
    rp.appendChild(card);
  });
  const hint=document.createElement('div');hint.style='color:#444;font-size:9px;margin-top:6px';hint.textContent='提示：同类型仆从重复抽到时自动保留最高品质';rp.appendChild(hint);
}
function toggleMinion(type){
  if(mActive.includes(type)){mActive=mActive.filter(t=>t!==type);}
  else if(mActive.length<2&&mSlots[type]>=0){mActive.push(type);}
  renderMinion();
}

function renderGear(){
  const rp=document.getElementById('rightPanel');rp.innerHTML='';
  mkSec(rp,'套装效果');
  const sg=document.createElement('div');sg.className='sg2';
  Object.entries(SUITS).forEach(([sn,sd])=>{
    const active=SA(sn);
    const d=document.createElement('div');d.style=`background:#0d1117;border:1px solid ${active?sd.color:'#1a1a1a'};border-radius:5px;padding:6px`;
    d.innerHTML=`<div style="color:${active?sd.color:'#444'};font-size:11px;font-weight:500">${sn}${active?' ✓':''}</div><div style="color:#444;font-size:9px">${sd.desc}</div>`;
    sg.appendChild(d);
  });rp.appendChild(sg);
  mkSec(rp,'已装备');
  const eg=document.createElement('div');eg.className='sg4';
  GTYPES.forEach(t=>{
    const g=eq[t];const slot=document.createElement('div');slot.className='gs'+(g?'':' empty');
    if(g)slot.style=`border-color:${RAR[g.rarity].b};background:${RAR[g.rarity].bg}`;
    slot.innerHTML=g?`<div class="gr" style="color:${RAR[g.rarity].c}">${RAR[g.rarity].n}</div><div class="gn" style="color:${RAR[g.rarity].c}">${g.name}</div><div class="gst">${Object.entries(g.stats).map(([k,v])=>k+'+'+v).join('<br>')}</div>${g.suit?`<div style="font-size:8px;color:${SUITS[g.suit]?.color||'#888'}">${g.suit}</div>`:''}`:`<div style="color:#222;font-size:10px;margin-top:4px">${t}</div>`;
    eg.appendChild(slot);
  });rp.appendChild(eg);
  const st=document.createElement('div');st.style='color:#444;font-size:9px;margin-bottom:5px';
  st.textContent=`攻+${Math.round(gStat('攻击'))} 防+${Math.round(gStat('防御'))} HP+${gStat('最大HP')} 暴击${Math.round(getCrit()*100)}%`;rp.appendChild(st);
  mkSec(rp,'背包 ('+bag.length+')');
  const arow=document.createElement('div');arow.style='display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;align-items:center';
  arow.innerHTML=`<button onclick="G.autoSell=Math.min(5,G.autoSell+1);renderGear()" style="font-size:9px;padding:2px 6px">阈值+</button>
    <button onclick="G.autoSell=Math.max(0,G.autoSell-1);renderGear()" style="font-size:9px;padding:2px 6px">阈值-</button>
    <button onclick="bag.forEach(g=>{G.gold+=5+g.rarity*12});bag=[];updHUD();renderGear()" style="font-size:9px;padding:2px 6px;color:#FF6B6B">全卖</button>
    <span style="color:#444;font-size:9px">自动卖: ${G.autoSell>0?RAR[G.autoSell-1].n+'以下':'关'}</span>`;
  rp.appendChild(arow);
  if(!bag.length){const em=document.createElement('div');em.style='color:#333;text-align:center;padding:12px;font-size:11px';em.textContent='背包为空';rp.appendChild(em);return;}
  const bg=document.createElement('div');bg.className='sg4';
  bag.forEach(g=>{
    const slot=document.createElement('div');slot.className='gs';
    slot.style=`border-color:${RAR[g.rarity].b};background:${RAR[g.rarity].bg};cursor:pointer`;
    slot.innerHTML=`<div class="gr" style="color:${RAR[g.rarity].c}">${RAR[g.rarity].n}</div><div class="gn" style="color:${RAR[g.rarity].c}">${g.name}</div><div class="gst">${Object.entries(g.stats).map(([k,v])=>k+'+'+v).join('<br>')}</div>${g.suit?`<div style="font-size:8px;color:${SUITS[g.suit]?.color||'#888'}">${g.suit}</div>`:''}<div style="font-size:8px;color:#7DF9AA;margin-top:1px">装备</div>`;
    slot.onclick=()=>{equipGear(g);renderGear();};bg.appendChild(slot);
  });rp.appendChild(bg);
}
function equipGear(g){
  const old=eq[g.type];eq[g.type]=g;bag=bag.filter(x=>x.id!==g.id);if(old)bag.push(old);
  const nm=getMxHp();G.hp=Math.min(G.hp+(nm-G.maxHp),nm);G.maxHp=nm;toast('装备 '+g.name);updHUD();
}

function renderShop(){
  const rp=document.getElementById('rightPanel');rp.innerHTML='';
  const secs=[['武器强化',UPG.weapon],['防御装备',UPG.defense],['被动天赋',UPG.passive]];
  secs.forEach(([title,grp])=>{
    mkSec(rp,title);const grid=document.createElement('div');grid.className='sg3';
    for(const[k,u]of Object.entries(grp)){
      const cost=uCost(k),maxed=u.lv>=u.mx,can=G.gold>=cost;
      const div=document.createElement('div');div.className='si'+(maxed?' owned':'');
      if(!maxed&&can)div.style.borderColor='#3a3a6a';
      div.innerHTML=`<div class="si-ic">${u.ic}</div><div class="si-nm">${u.n}<span class="si-lv">${u.lv}/${u.mx}</span></div><div class="si-ds">${u.d}</div><div class="si-pr">${maxed?'满级':(can?cost:'<span style="color:#333">'+cost+'</span>')+' 金'}</div>`;
      if(!maxed)div.onclick=()=>{buyU(k);renderShop();};grid.appendChild(div);
    }rp.appendChild(grid);
  });
  mkSec(rp,'扫荡 — 通关BOSS后解锁');
  const si=document.createElement('div');si.style='color:#444;font-size:10px;margin-bottom:5px';si.textContent='已通关最高波次: '+P.clearedWave;rp.appendChild(si);
  [1,2,3,4,5,6].forEach(bn=>{
    const ok=P.clearedWave>=bn*5;const wn=bn*5;
    const box=document.createElement('div');box.className='rb';
    const ec=Math.round(wn*28),es=Math.round(wn*80);
    box.innerHTML=`<div><div style="color:${ok?'#FFE066':'#2a2a2a'};font-size:11px;font-weight:500">第${bn}个BOSS</div><div style="font-size:9px;color:#444">金~${ec} 分~${es} 装备${Math.round(Math.min(70,10+bn*8))}%</div></div>
      <div style="display:flex;gap:3px">
        <button onclick="doSweep(${bn},1)" style="padding:2px 7px;font-size:9px;color:${ok?'#7DF9AA':'#333'}" ${ok?'':'disabled'}>x1</button>
        <button onclick="doSweep(${bn},10)" style="padding:2px 7px;font-size:9px;color:${ok?'#FFE066':'#333'}" ${ok?'':'disabled'}>x10</button>
      </div>`;
    rp.appendChild(box);
  });
  const pb=document.createElement('div');pb.style='background:#12121e;border:1px solid #2a2a3a;border-radius:5px;padding:9px;margin-top:7px;text-align:center';
  pb.innerHTML=`<p style="color:#888;font-size:10px;margin-bottom:5px">转生：重置升级，永久+25%加成<br>需累计 <span style="color:#c084fc">${presReq()}</span> 分</p><button onclick="doPrestige()" style="padding:4px 14px;font-size:11px;font-family:monospace;background:#1a1030;color:#c084fc;border:1px solid #7c3aed;cursor:pointer">转生重置</button>`;
  rp.appendChild(pb);
}

function doSweep(bn,times){
  if(P.clearedWave<bn*5){toast('需通关第'+bn+'个BOSS');return;}
  const wn=bn*5;let c=0,s=0;const gs=[];
  for(let i=0;i<times;i++){c+=Math.round(wn*28*(1+Math.random()*0.4));s+=Math.round(wn*80*(1+Math.random()*0.3));if(Math.random()<Math.min(0.7,0.1+bn*0.08))gs.push(rollGear(Math.min(3,bn-1),wn));}
  G.gold+=c;G.score+=s;P.allScore+=s;gs.forEach(g=>bag.push(g));autoProcess(wn);if(G.score>P.best)P.best=G.score;updHUD();
  toast('扫荡x'+times+': +'+c+'金 +'+Math.round(s)+'分'+(gs.length?' +'+gs.length+'件':''));renderShop();
}
function buyU(k){
  const u=AU()[k],cost=uCost(k);if(G.gold<cost||u.lv>=u.mx)return;
  G.gold-=cost;u.lv++;if(k==='shield')G.shield=Math.min(G.shield+1,u.lv);
  const nm=getMxHp();G.hp=Math.min(G.hp+(nm-G.maxHp),nm);G.maxHp=nm;toast(u.n+' Lv'+u.lv);updHUD();
}
function doPrestige(){
  if(P.allScore<presReq())return;
  P.prestige++;P.pBonus=1+P.prestige*0.25;
  for(const g of Object.values(UPG))for(const u of Object.values(g))u.lv=0;
  G.maxHp=100;G.hp=100;G.shield=0;toast('转生！x'+P.pBonus.toFixed(2));updHUD();
  document.getElementById('pBadge').style.display='inline';document.getElementById('pCnt').textContent=P.prestige;
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity=0,1800);}
function showWaveBanner(txt){const b=document.getElementById('waveBanner');b.innerHTML=txt;b.style.opacity=1;clearTimeout(b._tid);b._tid=setTimeout(()=>b.style.opacity=0,2200);}
function updHUD(){
  const mh=getMxHp();G.maxHp=mh;G.hp=Math.max(0,Math.min(G.hp,mh));
  const pct=Math.round(G.hp/mh*100);
  document.getElementById('hpbar-fill').style.width=pct+'%';
  document.getElementById('hpbar-fill').style.background=pct>60?'#4ade80':pct>30?'#FFE066':'#FF6B6B';
  document.getElementById('hpbar-txt').textContent=Math.round(G.hp)+'/'+mh;
  document.getElementById('tc').textContent=Math.round(G.gold);
  document.getElementById('sc').textContent=Math.round(G.score);
  document.getElementById('hi').textContent=Math.round(P.best);
  document.getElementById('wv').textContent=G.wave;
}

canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;G.mx=(e.clientX-r.left)*sx;G.my=(e.clientY-r.top)*sy;});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;G.mx=(e.touches[0].clientX-r.left)*sx;G.my=(e.touches[0].clientY-r.top)*sy;},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&G.state==='playing'&&UPG.defense.dash.lv>0&&G.dCool<=0){G.dActive=20+UPG.defense.dash.lv*5;G.dCool=100-UPG.defense.dash.lv*12;toast('冲刺！');e.preventDefault();}});

initStars();drawBg(1);
ctx.fillStyle='#7DF9AA';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillText('像素射击战',W/2,H/2-32);
ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('抽卡召唤仆从 · 套装系统 · 跳关',W/2,H/2+0);
ctx.fillStyle='#FFE066';ctx.font='10px monospace';ctx.fillText('通关5波→下局跳至6波 | 仆从有5阶品质',W/2,H/2+22);
updHUD();
</script>
