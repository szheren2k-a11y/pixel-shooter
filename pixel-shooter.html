<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>像素射击战 v6</title>
<style>
:root{
  --game-w:min(500px,calc(100vw - 16px));
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{max-width:100%;overflow-x:hidden}
body{background:#06060e;display:flex;justify-content:center;font-family:monospace;padding:8px 0 env(safe-area-inset-bottom);overscroll-behavior:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#gw{display:flex;flex-direction:column;align-items:center;width:var(--game-w);max-width:100%}
#bar{display:flex;gap:8px;margin-bottom:5px;font-size:12px;color:#888;flex-wrap:wrap;justify-content:center;align-items:center}
#bar b{color:#FFE066}
#hpw{display:flex;align-items:center;gap:5px}
#hpbg{width:110px;height:10px;background:#2a0a0a;border:1px solid #5a1a1a;border-radius:3px;overflow:hidden}
#hpf{height:100%;border-radius:2px;transition:width .2s}
#hpt{font-size:11px;color:#FF6B6B;min-width:42px}
#tabs{display:flex;margin-bottom:6px;width:100%}
.tab{padding:5px 12px;font-size:12px;cursor:pointer;background:#111;color:#666;border:1px solid #2a2a2a}
.tab.on{background:#1a1a2e;color:#7DF9AA;border-color:#7DF9AA}
canvas{width:100%;height:auto;border:1.5px solid #2a2a2a;border-radius:4px;display:block;image-rendering:pixelated;touch-action:none}
#rp{display:none;width:100%;background:#080810;border:1.5px solid #2a2a2a;border-radius:4px;padding:12px;max-height:660px;overflow-y:auto}
#rp.show{display:block}
.sec{color:#7DF9AA;font-size:11px;font-weight:500;margin:8px 0 5px;border-bottom:1px solid #1a2a1a;padding-bottom:2px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:4px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px}
.gs{border:1px solid #2a2a4a;border-radius:5px;padding:6px;min-height:58px;cursor:pointer}
.gs:hover{border-color:#555}
.gr{font-size:9px;font-weight:500;margin-bottom:1px}
.gn{font-size:10px;font-weight:500;margin-bottom:1px}
.gst{font-size:9px;color:#555;line-height:1.3}
.mc{background:#0a0a14;border:1px solid #1a1a2a;border-radius:5px;padding:8px;margin-bottom:5px}
.mc.on{border-color:#7DF9AA}
#toast{position:absolute;top:44px;left:50%;transform:translateX(-50%);background:#1a2a3a;color:#7DF9AA;padding:4px 11px;border-radius:4px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:10}
#ga{position:relative;display:block;width:100%}
#ctrls{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
button{padding:5px 14px;font-size:12px;cursor:pointer;background:#0a0a14;color:#888;border:1px solid #2a2a2a;border-radius:3px;font-family:monospace}
button:hover{border-color:#7DF9AA;color:#7DF9AA}
#msg2{margin-top:4px;font-size:10px;color:#333;text-align:center}
#wb{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#FFE066;font-size:17px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .4s;text-align:center;line-height:1.6;z-index:5}
#skipOv,#cardOv{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;border-radius:4px}
#skipOv.show,#cardOv.show{display:flex}
#skillOv{position:absolute;bottom:0;left:0;width:100%;background:#080810;border-top:1px solid #2a2a2a;padding:10px;display:none;flex-direction:column;align-items:center;z-index:10}
.card3{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.sc{width:140px;min-height:168px;background:#0d1520;border:2px solid #2a4a7a;border-radius:8px;padding:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;transition:border-color .15s}
.sc:hover{border-color:#7DF9AA;background:#0d1a14}
.sc b{font-size:20px;margin-bottom:7px;color:#7DF9AA;display:block}
.sc h3{color:#eee;font-size:12px;font-weight:500;margin-bottom:4px}
.sc p{color:#555;font-size:10px;line-height:1.4;font-weight:400}
.stabs{display:flex;margin-bottom:7px}
.stab{padding:4px 11px;font-size:11px;cursor:pointer;background:#080810;color:#444;border:1px solid #1a1a1a}
.stab.on{background:#0d1a0d;color:#7DF9AA;border-color:#7DF9AA}
#mobileBlast{position:absolute;right:12px;bottom:12px;z-index:12;display:none;min-width:72px;min-height:72px;border-radius:50%;border:2px solid #FFE066;background:rgba(10,10,20,.88);color:#FFE066;font-size:12px;font-weight:bold;backdrop-filter:blur(3px);touch-action:manipulation}
@media (pointer:fine){
  canvas{cursor:none}
}
@media (max-width:640px){
  :root{
    --game-w:min(500px,calc(100vw - 10px));
  }
  body{padding:5px 0 calc(env(safe-area-inset-bottom) + 6px)}
  #bar{gap:6px;font-size:11px;margin-bottom:6px}
  #tabs{gap:4px}
  .tab{flex:1;text-align:center;padding:9px 4px;font-size:12px}
  #rp{padding:10px;max-height:none}
  #ctrls{width:100%}
  button{min-height:38px;padding:8px 12px;font-size:12px}
  #msg2{font-size:11px;line-height:1.5;padding:0 8px}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .card3{gap:8px}
  .sc{width:calc(50% - 4px);min-width:140px}
  #mobileBlast{display:block}
}
</style></head><body>
<div id="gw">
<div id="bar">
  <div id="hpw"><span style="color:#FF6B6B">HP</span><div id="hpbg"><div id="hpf" style="width:100%"></div></div><span id="hpt">100/100</span></div>
  金:<b id="tc">0</b> 转生币:<b id="rc" style="color:#c084fc">0</b> 分:<b id="sc">0</b> 最高:<b id="hi">0</b> 波:<b id="wv">1</b>
</div>
<div id="tabs">
  <div class="tab on" id="tab-game" onclick="ST('game')">游戏</div>
  <div class="tab" id="tab-minion" onclick="ST('minion')">仆从</div>
  <div class="tab" id="tab-gear" onclick="ST('gear')">装备</div>
  <div class="tab" id="tab-skill" onclick="ST('skill')">技能</div>
</div>
<div id="ga">
  <canvas id="c" width="500" height="640"></canvas>
  <div id="toast"></div>
  <div id="wb"></div>
  <div id="skipOv">
    <div style="color:#FFE066;font-size:18px;font-weight:bold;margin-bottom:10px">快速跳关</div>
    <div style="color:#aaa;font-size:13px;margin-bottom:12px" id="skipTxt"></div>
    <div style="width:300px;height:7px;background:#1a1a1a;border-radius:3px;overflow:hidden"><div id="skipProg" style="height:100%;background:#FFE066;border-radius:3px;width:0%"></div></div>
    <div style="color:#444;font-size:10px;margin-top:7px" id="skipRew"></div>
  </div>
  <div id="cardOv">
    <div style="color:#7DF9AA;font-size:15px;font-weight:bold">通关奖励</div>
    <div style="color:#555;font-size:10px;margin:4px 0 8px" id="cardSub"></div>
    <div class="card3" id="cardRow"></div>
  </div>
  <div id="skillOv">
    <div style="color:#7DF9AA;font-size:15px;font-weight:bold">选择技能卡牌</div>
    <div style="color:#555;font-size:10px;margin:4px 0 8px" id="skillSub"></div>
    <div class="card3" id="skillRow"></div>
  </div>
</div>
<div id="rp"></div>
<div id="ctrls">
  <button id="btn" onclick="startGame()">开始游戏</button>
  <button onclick="ST('minion')">仆从</button>
  <button onclick="ST('gear')">装备</button>
</div>
<div id="msg2">桌面: 鼠标移动 | 手机: 手指拖动 | 消灭过半怪物后下一波提前进场</div>
</div>
<script>
'use strict';
const CV=document.getElementById('c'),CT=CV.getContext('2d'),W=500,H=640;

// ═══ 持久数据 ═══
const P={rc:5,clearedWave:0,gold:0,sp:0,eLv:{武器:0,护甲:0,头盔:0,饰品:0}};

// ═══ 每局数据（startGame重建） ═══
let G=null,PL=null;
let stars=[],pB=[],eB=[],enemies=[],parts=[],drops=[],cZ=[],wQ=[],spT=0;

// ═══ loop控制：唯一入口 ═══
let RID=null; // requestAnimationFrame ID
function startLoop(){
  if(RID!==null)return; // 已在运行
  if(!G||G.state!=='playing')return;
  G.lt=performance.now();
  RID=requestAnimationFrame(tick);
}
function stopLoop(){
  if(RID!==null){cancelAnimationFrame(RID);RID=null;}
}

// ═══ 人物等级和经验 ═══
let playerLevel=0,playerExp=0,expToNext=50;

// ═══ 技能（持久，转生清零） ═══
let SK={atk:0,def:0,hpUp:0,fr:0,ms:0,pr:0,regen:0,crit:0,mag:0,shield:0};
const SKILL_ORDER=['atk','def','hpUp','fr','ms','pr','regen','crit','mag','shield'];
const SKILL_META={
  atk:{ic:'!',n:'攻击强化',d:'+10%伤害',cap:Infinity},
  def:{ic:'A',n:'防御强化',d:'+8%减伤倍率',cap:Infinity},
  hpUp:{ic:'H',n:'生命强化',d:'+25最大HP',cap:Infinity},
  fr:{ic:'>',n:'射速提升',d:'+15%射速',cap:Infinity},
  ms:{ic:'M',n:'多重射击',d:'+1弹道',cap:5},
  pr:{ic:'P',n:'穿透',d:'+1穿透',cap:5},
  regen:{ic:'R',n:'持续回血',d:'每波结束+15HP',cap:Infinity},
  crit:{ic:'C',n:'暴击强化',d:'+8%暴击',cap:5},
  mag:{ic:'@',n:'磁铁',d:'吸收范围+60',cap:5},
  shield:{ic:'S',n:'护盾强化',d:'+1初始护盾',cap:5},
};
function getSkillCap(key){return SKILL_META[key]?.cap??Infinity;}
function getSkillCost(key){
  const rank=SK[key]||0;
  return getSkillCap(key)<Infinity?10*Math.pow(10,rank):Math.pow(2,rank);
}
function getBaseShield(){return SK.shield||0;}
function buySkill(key){
  const meta=SKILL_META[key];
  if(!meta)return;
  const rank=SK[key]||0;
  const cap=getSkillCap(key);
  if(rank>=cap){showToast(meta.n+' 已满级');return;}
  const cost=getSkillCost(key);
  if(P.sp<cost){showToast('技能点不足，需'+cost);return;}
  P.sp-=cost;
  SK[key]=rank+1;
  if(key==='hpUp'&&G){
    const nm=getMxHp();
    G.hp=Math.min(G.hp+(nm-G.maxHp),nm);
    G.maxHp=nm;
  }
  if(key==='shield'&&G&&G.state!=='dead')G.shield+=1;
  showToast(meta.n+' Lv.'+SK[key]);
  updHUD();
  if(curTab==='skill')renderSkill();
}

// ═══ 品质 ═══
const RAR=[
  {n:'普通',c:'#aaa',b:'#555',bg:'#111'},
  {n:'优秀',c:'#4ade80',b:'#16a34a',bg:'#091509'},
  {n:'精良',c:'#60a5fa',b:'#2563eb',bg:'#090e18'},
  {n:'史诗',c:'#c084fc',b:'#7c3aed',bg:'#100918'},
  {n:'传说',c:'#fb923c',b:'#ea580c',bg:'#150800'},
];
const GT=['武器','护甲','头盔','饰品'];
const WSUB=['速射','步枪','散弹','火炮','激光'];
let bag=[],eq={武器:null,护甲:null,头盔:null,饰品:null};

// 自动卖出设置：-1=不卖，0=普通，1=优秀，2=精良，3=史诗
let autoSellMinRarity = -1;

// ═══ 护甲套装 ═══
const AS={
  '爆炸套':{s:['武器','护甲'],d:'击杀AOE爆炸',c:'#fb923c'},
  '回血套':{s:['头盔','饰品'],d:'每5秒回3%HP',c:'#4ade80'},
  '护盾套':{s:['护甲','头盔'],d:'受伤后获3护盾',c:'#60a5fa'},
  '暴击套':{s:['武器','饰品'],d:'暴击+30%伤害x2',c:'#FFE066'},
};
function SA(n){return AS[n].s.filter(t=>eq[t]&&eq[t].suit===n).length>=2;}

// ═══ 武器套装 ═══
const WS={
  '疾风套':{d:'2件+20%射速 4件+50%'},
  '弹道套':{d:'2件+1弹道 4件+3弹道'},
  '高能套':{d:'2件分裂3颗 4件分裂7颗'},
  '激光套':{d:'2件激光冷却-1秒 4件激光冷却-2秒'},
};
function wsN(n){return GT.filter(t=>eq[t]&&eq[t].wsuit===n).length;}
function wsB(){
  let rm=1,es=0,sp=0;
  const fw=wsN('疾风套');if(fw>=4)rm*=0.5;else if(fw>=2)rm*=0.8;
  const bw=wsN('弹道套');if(bw>=4)es+=3;else if(bw>=2)es+=1;
  const hw=wsN('高能套');if(hw>=4)sp=7;else if(hw>=2)sp=3;
  return{rm,es,sp};
}

// ═══ 武器子类型效果 ═══
function wMods(){
  const w=eq['武器'];
  if(!w||!w.sub){
    return{rm:1,dm:1,es:0,cm:false,cr:0,lm:false,lc:120};
  }
  const f=w.rarity/4,t=w.sub;
  if(t==='速射')return{rm:1-f*0.5,dm:1+f*0.5,es:0,cm:false,cr:0,lm:false,lc:120};
  if(t==='步枪')return{rm:1+f*0.5,dm:1-f*0.5,es:0,cm:false,cr:0,lm:false,lc:120};
  if(t==='散弹')return{rm:1,dm:1,es:Math.floor(f*5),cm:false,cr:0,lm:false,lc:120};
  if(t==='火炮')return{rm:2.8,dm:1,es:0,cm:true,cr:W*(0.1+f*0.4),lm:false,lc:120};
  if(t==='激光'){
    const baseCool=120;
    const rarityReduce=w.rarity*50;
    const speedReduce=SK.fr*15;
    const laserSuitReduce=wsN('激光套')>=4?120:wsN('激光套')>=2?60:0;
    return{rm:1,dm:1,es:0,cm:false,cr:0,lm:true,lc:Math.max(0,baseCool-rarityReduce-speedReduce-laserSuitReduce)};
  }
  return{rm:1,dm:1,es:0,cm:false,cr:0,lm:false,lc:120};
}

// ═══ 属性计算 ═══
function gS(s){let v=0;for(const g of Object.values(eq))if(g&&g.stats&&g.stats[s])v+=g.stats[s];return v;}
function getAtk(){return(1+gS('攻击')/20)*(1+SK.atk*0.1)*wMods().dm;}
function getCrit(){let c=Math.min(.88,gS('暴击率')/100+SK.crit*0.08);if(SA('暴击套'))c=Math.min(.95,c+.3);return c;}
function getCritD(){return(1.5+gS('暴击伤害')/100)*(SA('暴击套')?2:1);}
function getDef(){return Math.min(.75,(gS('防御')/100+gS('格挡')/150)*(1+SK.def*0.08));}
function getMxHp(){return Math.round(100+gS('最大HP')+SK.hpUp*25);}
function getFireI(){return Math.max(3,(20/(1+SK.fr*0.15))*wMods().rm*wsB().rm);}
function getMS(){return Math.max(1,1+SK.ms+wMods().es+wsB().es);}
function getCB(){return 1+gS('金币')/80;}

// ═══ 装备生成 ═══
function rollGear(minR,wave,boss,forceType){
  minR=minR||0;wave=wave||1;boss=!!boss;
  const w=boss?[0,10,25,38,27]:[65,20,9,4,2];
  let r=Math.random()*w.reduce((a,b)=>a+b),ri=0;
  for(let i=0;i<5;i++){r-=w[i];if(r<=0){ri=i;break;}}
  ri=Math.max(ri,minR);
  const type=forceType||GT[Math.floor(Math.random()*4)];
  const pools={武器:['攻击','暴击率','暴击伤害','射速'],护甲:['防御','最大HP','格挡'],头盔:['最大HP','防御','攻击'],饰品:['暴击率','攻击','最大HP','金币']};
  const n=1+Math.floor(ri/2)+Math.floor(Math.random()*2);
  const ch=pools[type].sort(()=>Math.random()-.5).slice(0,n);
  const base=(1+ri*.7)*(1+wave*.03);
  const stats={};
  ch.forEach(s=>{stats[s]=Math.round((base+Math.random()*base*.8)*(s==='暴击率'||s==='格挡'?5:s==='暴击伤害'?14:s==='最大HP'?20:s==='金币'?8:s==='射速'?1:5));});
  const suit=(ri>=2&&Math.random()<.3)?Object.keys(AS)[Math.floor(Math.random()*4)]:null;
  const wsuit=(type==='武器'&&ri>=2&&Math.random()<.35)?Object.keys(WS)[Math.floor(Math.random()*Object.keys(WS).length)]:null;
  const sub=type==='武器'?WSUB[Math.floor(Math.random()*5)]:null;
  const pfx=['锈蚀','古老','精锻','神圣','毁灭'][ri];
  const nms={武器:['裂空枪','星光炮','暗影矢','闪电刃','毁灭炮'],护甲:['铁皮甲','强化甲','精金甲','秘银甲'],头盔:['铁头盔','战士盔','英雄盔','传奇盔'],饰品:['护符','符文石','魔力环','命运石']};
  return{name:pfx+nms[type][Math.floor(Math.random()*nms[type].length)],type,rarity:ri,stats:{...stats},baseStats:{...stats},lv:0,suit,wsuit,sub,id:Math.random()};
}

function initWeapons(){
  eq={武器:null,护甲:null,头盔:null,饰品:null};
  bag=[];
}

function autoProc(w){
  bag=bag.filter(g=>{if(autoSellMinRarity>=0&&g.rarity<=autoSellMinRarity){P.gold+=(g.rarity===0?3:5+g.rarity*12);return false;}return true;});
  for(const t of GT)for(let ri=0;ri<4;ri++){
    const sm=bag.filter(g=>g.type===t&&g.rarity===ri);
    if(sm.length>=3){sm.slice(0,3).forEach(g=>bag=bag.filter(x=>x.id!==g.id));bag.push(rollGear(ri+1,w,false,t));showToast('合成! '+RAR[ri+1].n);break;}
  }
}

function ensureGearState(g){
  if(!g)return g;
  if(g.lv==null)g.lv=0;
  if(!g.baseStats)g.baseStats={...g.stats};
  return g;
}

function applyGearLevel(g){
  ensureGearState(g);
  const mult=Math.pow(1.1,g.lv||0);
  Object.keys(g.baseStats).forEach(k=>{
    g.stats[k]=Math.round(g.baseStats[k]*mult);
  });
  return g;
}

function upgradeG(t){
  const g=ensureGearState(eq[t]);if(!g){showToast('无装备');return;}
  const cost=(g.lv+1)*300;if(P.gold<cost){showToast('需'+cost+'金');return;}
  P.gold-=cost;g.lv++;
  applyGearLevel(g);
  showToast(g.name+' +'+g.lv);updHUD();if(curTab==='gear')renderGear();
}

function ascendG(t){
  const g=ensureGearState(eq[t]);if(!g){showToast('无装备');return;}
  const mat=bag.find(x=>x.type===t&&x.rarity===g.rarity);
  if(!mat){showToast('背包需1件同部位同品质');return;}
  bag=bag.filter(x=>x.id!==mat.id);
  const ng=rollGear(g.rarity,G?G.wave:1,false,t);
  ng.lv=g.lv;
  applyGearLevel(ng);
  eq[t]=ng;
  if(G){const nm=getMxHp();G.hp=Math.min(G.hp+(nm-G.maxHp),nm);G.maxHp=nm;}
  showToast(t+' 升阶重铸! '+RAR[ng.rarity].n);updHUD();if(curTab==='gear')renderGear();
}

function equipG(g){
  ensureGearState(g);
  const old=eq[g.type];eq[g.type]=g;
  bag=bag.filter(x=>x.id!==g.id);if(old)bag.push(old);
  if(G){const nm=getMxHp();G.hp=Math.min(G.hp+(nm-G.maxHp),nm);G.maxHp=nm;}
  showToast('装备 '+g.name);updHUD();
}

// ═══ 仆从 ═══
const MT=['archer','knight','mage','healer'];
const MM={archer:{n:'弓箭手',ic:'A',d:'追踪连射'},knight:{n:'骑士',ic:'K',d:'护盾震荡'},mage:{n:'法师',ic:'M',d:'AOE魔法'},healer:{n:'牧师',ic:'H',d:'神圣回复'}};
let mD={archer:null,knight:null,mage:null,healer:null},mAct=[],mCl={archer:0,knight:0,mage:0,healer:0};
function ensureMinionData(d){
  if(!d)return d;
  if(d.lvl==null)d.lvl=d.lv||0;
  if(d.rank==null)d.rank=0;
  if(d.sh==null)d.sh=0;
  return d;
}
function mCD(t){
  const d=ensureMinionData(mD[t]);if(!d)return 9999;
  const b={archer:40,knight:720,mage:100,healer:180};
  const rankReduce={archer:0,knight:45,mage:0,healer:24};
  const minCd={archer:10,knight:300,mage:10,healer:70};
  return Math.max(minCd[t],b[t]-d.ri*10-d.rank*rankReduce[t]);
}
function mPow(t){
  const d=ensureMinionData(mD[t]);if(!d)return 1;
  return 1+d.ri*0.9+d.lvl*0.75+d.rank*0.4;
}
function autoRankMinion(t,silent){
  const d=ensureMinionData(mD[t]);if(!d)return 0;
  let gained=0;
  while(d.sh>=Math.pow(5,d.rank)){
    d.sh-=Math.pow(5,d.rank);
    d.rank++;
    gained++;
  }
  if(gained>0&&!silent)showToast(MM[t].n+' 自动升阶+'+d.rank);
  return gained;
}

function doGacha(n){
  const cost=n*5;if(P.rc<cost){showToast('转生币不足需'+cost);return;}P.rc-=cost;
  const res=[];
  const shardGain={archer:0,knight:0,mage:0,healer:0};
  const rankGain={archer:0,knight:0,mage:0,healer:0};
  for(let i=0;i<n;i++){
    const t=MT[Math.floor(Math.random()*4)];
    const cum=[40,70,88,97,100];let ri=0,r=Math.random()*100;
    for(let j=0;j<5;j++)if(r<cum[j]){ri=j;break;}
    res.push({t,ri});
    const c=mD[t];
    if(!c)mD[t]={ri,lvl:0,rank:0,sh:0};
    else{
      ensureMinionData(c);
      if(ri>c.ri)c.ri=ri;
      else{
        c.sh++;
        shardGain[t]++;
        rankGain[t]+=autoRankMinion(t,true);
      }
    }
  }
  const best=res.reduce((a,b)=>b.ri>a.ri?b:a);
  const gainTxt=MT.filter(t=>shardGain[t]||rankGain[t]).map(t=>MM[t].n+(shardGain[t]?'+碎片'+shardGain[t]:'')+(rankGain[t]?'+升阶'+rankGain[t]:'')).join(' ');
  showToast('抽'+n+'张 最高:'+RAR[best.ri].n+' '+MM[best.t].n+(gainTxt?' | '+gainTxt:''));
  updHUD();if(curTab==='minion')renderMinion();
}

function upgM(t){
  const d=ensureMinionData(mD[t]);if(!d){showToast('未拥有');return;}
  const need=Math.pow(5,d.rank);if(d.sh<need){showToast('碎片不足需'+need);return;}
  d.sh-=need;d.rank++;showToast(MM[t].n+' 升阶+'+d.rank);if(curTab==='minion')renderMinion();
}

function lvlM(t){
  const d=ensureMinionData(mD[t]);if(!d){showToast('未拥有');return;}
  const cost=(d.lvl+d.ri+1)*500;if(P.gold<cost){showToast('需'+cost+'金');return;}
  P.gold-=cost;d.lvl++;showToast(MM[t].n+' 强化Lv'+d.lvl);updHUD();if(curTab==='minion')renderMinion();
}

function toggleMA(t){
  if(mAct.includes(t))mAct=mAct.filter(x=>x!==t);
  else if(mAct.length<4&&mD[t])mAct.push(t);
  renderMinion();
}

function mActFn(type,mx,my){
  const d=ensureMinionData(mD[type]);if(!d)return;
  const ri=d.ri,pow=mPow(type);
  if(type==='archer'){
    if(!enemies.length)return;
    const tgt=enemies.reduce((a,b)=>a.y>b.y?a:b);
    const dx=tgt.x-mx,dy=tgt.y-my,dl=Math.hypot(dx,dy);if(dl===0)return;
    const arrows=1+ri+d.rank,spr=0.05*(ri+d.rank*.7),dmg=getAtk()*pow*(3+ri*2);
    for(let i=0;i<arrows;i++){const a=(i-(arrows-1)/2)*spr,cs=Math.cos(a),sn=Math.sin(a);pB.push({x:mx,y:my,vx:(dx/dl*13)*cs-(dy/dl*13)*sn,vy:(dy/dl*13)*cs+(dx/dl*13)*sn,dmg,crit:.15+ri*.04,cd:1.6,pr:0,ph:0,col:RAR[ri].c,aoe:ri>=4?35:0,sp:0});}
    if(ri+d.rank>=3)for(let i=0;i<12;i++)parts.push({x:mx,y:my,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,life:.8,color:RAR[ri].c,sz:2+ri,glow:true,txt:null});
  }else if(type==='knight'){
    const sh=2+ri*2+d.rank*2+d.lvl*2;G.shield+=sh;
    const range=50+(ri+d.rank)*25,dmg=getAtk()*pow*(2+ri*2);
    enemies.forEach(e=>{if(Math.hypot(e.x-PL.x,e.y-PL.y)<range){damageEnemy(e,dmg);spP(e.x,e.y,RAR[ri].c,4);}});
    for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,r2=Math.random()*range;parts.push({x:PL.x+Math.cos(a)*r2,y:PL.y+Math.sin(a)*r2,vx:Math.cos(a)*2,vy:Math.sin(a)*2,life:.7,color:RAR[ri].c,sz:3,glow:ri>=3,txt:null});}
    showToast('骑士护盾+'+sh);
  }else if(type==='mage'){
    if(!enemies.length)return;
    const tgt=enemies.reduce((a,b)=>a.hp<b.hp?a:b);
    const aoe=60+ri*20+d.rank*35,dmg=getAtk()*pow*(8+ri*5);
    const ex=tgt.x,ey=tgt.y-tgt.h/2-8;
    enemies.forEach(oe=>{if(Math.hypot(oe.x-ex,oe.y-ey)<aoe){damageEnemy(oe,dmg);spP(oe.x,oe.y,RAR[ri].c,5);}});
    for(let i=0;i<24;i++){const a=i/24*Math.PI*2,r2=8+Math.random()*aoe*.4;parts.push({x:ex+Math.cos(a)*r2,y:ey+Math.sin(a)*r2,vx:Math.cos(a)*1.2,vy:Math.sin(a)*1.2,life:1.1,color:RAR[ri].c,sz:3,glow:true,txt:null});}
    parts.push({x:ex,y:ey-10,vx:0,vy:-.5,life:0.9,color:RAR[ri].c,sz:2,glow:false,txt:'爆'});
  }else if(type==='healer'){
    const base=8+ri*8,heal=base*pow;
    G.hp=Math.min(G.maxHp,G.hp+heal);
    for(let i=0;i<10+ri*4;i++){const a=Math.random()*Math.PI*2,r2=Math.random()*(40+ri*14);parts.push({x:PL.x+Math.cos(a)*r2,y:PL.y+Math.sin(a)*r2,vx:0,vy:-1.5,life:1,color:RAR[ri].c,sz:2+ri,glow:true,txt:null});}
    parts.push({x:PL.x,y:PL.y-20,vx:0,vy:-.8,life:1.4,color:RAR[ri].c,sz:2,glow:false,txt:'+'+Math.round(heal)+'HP'});
    if(ri+d.rank>=4)eB=eB.filter(b=>Math.hypot(b.x-PL.x,b.y-PL.y)>80);
  }
}

    CT.strokeStyle='rgba(192,132,252,'+(.4+Math.sin(G.fr*.1)*.2)+')';CT.lineWidth=1.5;CT.beginPath();CT.arc(x,y,600/Math.PI,0,Math.PI*2);CT.stroke();
    CT.strokeStyle='rgba(192,132,252,.15)';CT.lineWidth=1;CT.beginPath();CT.arc(x,y,600/Math.PI*.7,0,Math.PI*2);CT.stroke();
  }
  const s=2.4,lg=Math.sin(wf*.28)*4*s,ag=Math.sin(wf*.28)*3*s,bob=Math.abs(Math.sin(wf*.28))*s*.5,by=y-bob;
  CT.fillStyle='#1a1a4a';CT.fillRect(Math.round(x-7),Math.round(by+10+lg*dir),6,9);CT.fillRect(Math.round(x+1),Math.round(by+10-lg*dir),6,9);
  CT.fillStyle='#2a1a0a';CT.fillRect(Math.round(x-8),Math.round(by+19+lg*dir),8,4);CT.fillRect(Math.round(x),Math.round(by+19-lg*dir),8,4);
  const sc=eq['护甲']?RAR[eq['护甲'].rarity].c:'#378ADD';
  CT.fillStyle=sc;CT.fillRect(Math.round(x-8),Math.round(by+1),16,10);CT.fillRect(Math.round(x-13),Math.round(by+1+ag*dir),5,8);CT.fillRect(Math.round(x+8),Math.round(by+1-ag*dir),5,8);
  CT.fillStyle='#F4C2A1';CT.fillRect(Math.round(x-13),Math.round(by+9+ag*dir),5,4);CT.fillRect(Math.round(x+8),Math.round(by+9-ag*dir),5,4);CT.fillRect(Math.round(x-7),Math.round(by-14),14,13);
  const hc=eq['头盔']?RAR[eq['头盔'].rarity].c:'#3B2507';
  CT.fillStyle=hc;CT.fillRect(Math.round(x-7),Math.round(by-14),14,4);CT.fillRect(Math.round(x+(dir>0?-8:4)),Math.round(by-12),4,8);
  CT.fillStyle='#111';CT.fillRect(Math.round(x-3+(dir>0?0:-3)),Math.round(by-10),4,4);CT.fillRect(Math.round(x+2+(dir>0?0:-3)),Math.round(by-10),4,4);
  CT.fillStyle='#c0392b';CT.fillRect(Math.round(x-3),Math.round(by-5),6,2);
  if(eq['武器']){CT.fillStyle=RAR[eq['武器'].rarity].c;CT.fillRect(Math.round(x+(dir>0?8:-14)),Math.round(by+2),6,14);}
  mAct.forEach((t,i)=>{
    const d=mD[t];if(!d)return;const ri=d.ri;
    const ang=G.fr*.018+i*Math.PI/2,mx2=x+Math.cos(ang)*55,my2=y+Math.sin(ang)*35;
    CT.strokeStyle=RAR[ri].c;CT.lineWidth=1.5;CT.beginPath();CT.arc(mx2,my2,10,0,Math.PI*2);CT.stroke();
    CT.fillStyle=RAR[ri].c+'44';CT.beginPath();CT.arc(mx2,my2,10,0,Math.PI*2);CT.fill();
    CT.fillStyle=RAR[ri].c;CT.font='bold 10px monospace';CT.textAlign='center';CT.fillText(MM[t].ic,mx2,my2+3);
    const cf=Math.max(0,1-mCl[t]/mCD(t));

    CT.fillStyle=RAR[ri].c;CT.fillRect(Math.round(mx2-10),Math.round(my2+12),Math.round(20*cf),2);
    mCl[t]-=1;if(mCl[t]<=0){mCl[t]=mCD(t);mActFn(t,mx2,my2);}
  });
}

const ET=[
  {n:'幼年恐龙',w:26,h:18,hp:2,spd:.6,exp:10,cn:5,col:'#84cc16',shape:'dino',sI:90,bS:2.8,bP:'single'},
  {n:'外星尖兵',w:22,h:22,hp:3,spd:.85,exp:20,cn:10,col:'#22c55e',shape:'alien',sI:65,bS:3.5,bP:'aimed'},
  {n:'异星重甲兽',w:30,h:24,hp:7,spd:.32,exp:35,cn:20,col:'#a855f7',shape:'brute',sI:48,bS:2.2,bP:'spread'},
  {n:'飞碟侦察者',w:28,h:18,hp:4,spd:.5,exp:28,cn:14,col:'#2dd4bf',shape:'ufo',sI:75,bS:3,bP:'spiral'},
  {n:'异星暴君',w:52,h:40,hp:40,spd:.22,exp:300,cn:120,col:'#FFE066',shape:'boss',sI:30,bS:3,bP:'boss'},
];
function bossStageFactor(w){
  return Math.pow(10,Math.floor((w-1)/5));
}
function wDiff(w){return 1+Math.pow(w-1,.65)*.6;}
function eM(w){return {hp:1+w*.18,dmg:1+w*.35+Math.pow(Math.max(0,w-1),1.2)*.14,cn:1+w*.1};}
function buildQ(waveNo){
  const q=[],em=eM(waveNo),bossFactor=bossStageFactor(waveNo);
  if(waveNo%5===0){
    const b={...ET[4]};
    b.hp=Math.round(b.hp*Math.pow(1.8,Math.floor(waveNo/5))*em.hp*bossFactor);
    b.maxHp=b.hp;b.cn=Math.round(b.cn*em.cn*bossFactor);b.exp=Math.round(b.exp*bossFactor);
    q.push(b);return q;
  }
  const diff=wDiff(waveNo),avail=Math.min(4,1+Math.floor((waveNo-1)/2)),pool=ET.slice(0,avail);
  const base=Math.round(7+waveNo*3.5);
  const total=Math.round(base*diff*.6);
  for(let i=0;i<total;i++){
    const t={...pool[Math.floor(Math.random()*pool.length)]};
    t.hp=Math.round(t.hp*diff*em.hp*bossFactor);
    t.maxHp=t.hp;
    t.cn=Math.round(t.cn*em.cn*bossFactor);
    t.exp=Math.round(t.exp*bossFactor);
    q.push(t);
  }
  return q.sort(()=>Math.random()-.5);
}

function aliveInWave(waveNo){
  return enemies.filter(e=>e.waveNo===waveNo).length+wQ.filter(e=>e.waveNo===waveNo).length;
}

function startWave(waveNo){
  const q=buildQ(waveNo).map(e=>({...e,waveNo}));
  wQ.push(...q);
  G.wave=waveNo;
  G.wTotal+=q.length;
  G.wLeft+=q.length;
  G.waveSizes[waveNo]=q.length;
  G.wState='spawning';
  spT=Math.min(spT||999,waveNo%5===0?12:5);
  G.laserCool=0;
  G.laserActive=false;
  G.laserTids=[];
  G.laserDmgCools=[];
  showWB('波次 '+waveNo+(waveNo%5===0?' BOSS！':''));
  updHUD();
}

function spE(t){
  enemies.push({...t,x:t.w/2+4+Math.random()*(W-t.w-8),y:-t.h/2-8,sT:Math.floor(Math.random()*t.sI),dx:(Math.random()-.5)*.45,mvPh:Math.random()*Math.PI*2,id:Math.random(),stopped:false,stopY:H*.38+Math.random()*40,sAng:0});

function fireE(e){
  const sp=e.bS,dm=eM(G.wave).dmg*bossStageFactor(G.wave);
  if(e.bP==='single'){eB.push({x:e.x,y:e.y+e.h/2,vx:0,vy:sp,color:e.col,r:3,dm});}
  else if(e.bP==='aimed'){const dx=PL.x-e.x,dy=PL.y-e.y,d=Math.hypot(dx,dy);if(d>0)eB.push({x:e.x,y:e.y,vx:dx/d*sp,vy:dy/d*sp,color:e.col,r:3,dm});}
  else if(e.bP==='spread'){[-0.38,0,0.38].forEach(a=>eB.push({x:e.x,y:e.y+e.h/2,vx:Math.sin(a)*sp,vy:Math.cos(a)*sp,color:e.col,r:4,dm}));}
  else if(e.bP==='spiral'){e.sAng=(e.sAng||0)+0.3;for(let i=0;i<3;i++){const a=e.sAng+i*Math.PI*2/3;eB.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:e.col,r:3,dm});}}
  else if(e.bP==='boss'){
    [-0.5,-0.25,0,0.25,0.5].forEach(a=>eB.push({x:e.x,y:e.y+e.h/2,vx:Math.sin(a)*sp,vy:Math.cos(a)*sp,color:'#FFE066',r:4,dm}));
    if(G.fr%160<80){const dx=PL.x-e.x,dy=PL.y-e.y,d=Math.hypot(dx,dy);if(d>0)eB.push({x:e.x,y:e.y,vx:dx/d*5.5,vy:dy/d*5.5,color:'#FF6B6B',r:5,dm});}
    if(G.fr%280<140){for(let i=0;i<8;i++){const a=i*Math.PI/4+G.fr*.02;eB.push({x:e.x,y:e.y,vx:Math.cos(a)*sp*.8,vy:Math.sin(a)*sp*.8,color:'#c084fc',r:3,dm});}}
  }
}

    CT.beginPath();CT.moveTo(x-w*.3,y+h*.02);CT.lineTo(x-w*.5,y+h*.22);CT.moveTo(x+w*.3,y+h*.02);CT.lineTo(x+w*.5,y+h*.22);CT.stroke();
    CT.beginPath();CT.moveTo(x-w*.08,y-h*.3);CT.lineTo(x-w*.18,y-h*.56);CT.moveTo(x+w*.08,y-h*.3);CT.lineTo(x+w*.18,y-h*.56);CT.stroke();
    CT.fillStyle='#a7f3d0';CT.beginPath();CT.arc(x-w*.18,y-h*.58,2,0,Math.PI*2);CT.arc(x+w*.18,y-h*.58,2,0,Math.PI*2);CT.fill();
    if(hr<1){CT.fillStyle='rgba(0,0,0,.4)';CT.fillRect(bx,Math.round(y+h/2+2),w,3);CT.fillStyle='#7DF9AA';CT.fillRect(bx,Math.round(y+h/2+2),Math.round(w*hr),3);}
  }else if(shape==='brute'){
    CT.fillStyle=col;CT.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;CT.lineTo(x+Math.cos(a)*w/2,y+Math.sin(a)*h/2);}CT.closePath();CT.fill();
    CT.fillStyle='rgba(255,255,255,.1)';CT.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;CT.lineTo(x+Math.cos(a)*w/3,y+Math.sin(a)*h/3);}CT.closePath();CT.fill();
    CT.fillStyle='#f5d0fe';CT.fillRect(Math.round(x-w*.22),Math.round(y-h*.08),Math.round(w*.14),Math.round(h*.12));CT.fillRect(Math.round(x+w*.08),Math.round(y-h*.08),Math.round(w*.14),Math.round(h*.12));
    CT.strokeStyle='#f0abfc';CT.lineWidth=2;CT.beginPath();CT.moveTo(x-w*.34,y-h*.2);CT.lineTo(x-w*.14,y-h*.44);CT.moveTo(x+w*.34,y-h*.2);CT.lineTo(x+w*.14,y-h*.44);CT.stroke();
    if(hr<1){CT.fillStyle='rgba(0,0,0,.4)';CT.fillRect(bx,Math.round(y+h/2+2),w,3);CT.fillStyle='#7DF9AA';CT.fillRect(bx,Math.round(y+h/2+2),Math.round(w*hr),3);}
  }else if(shape==='ufo'){
    const sway=Math.sin(G.fr*.08+e.id*12)*2;
    CT.fillStyle=col+'cc';CT.beginPath();CT.ellipse(x,y+sway,w*.5,h*.22,0,0,Math.PI*2);CT.fill();
    CT.fillStyle='rgba(220,255,255,.28)';CT.beginPath();CT.ellipse(x,y-h*.12+sway,w*.24,h*.2,0,Math.PI,Math.PI*2);CT.fill();
    CT.strokeStyle=col;CT.lineWidth=1.5;CT.beginPath();CT.ellipse(x,y+sway,w*.5,h*.22,0,0,Math.PI*2);CT.stroke();
    CT.fillStyle='#a5f3fc';for(let i=-2;i<=2;i++){CT.beginPath();CT.arc(x+i*(w*.16),y+h*.08+sway,1.8,0,Math.PI*2);CT.fill();}
    if(hr<1){CT.fillStyle='rgba(0,0,0,.4)';CT.fillRect(bx,Math.round(y+h/2+2),w,3);CT.fillStyle='#7DF9AA';CT.fillRect(bx,Math.round(y+h/2+2),Math.round(w*hr),3);}
  }else{
    const rx=w/2,ry=h/2,cut=Math.min(rx,ry)*0.35;
    CT.fillStyle=col;
    CT.beginPath();
    CT.moveTo(x-rx+cut,y-ry);
    CT.lineTo(x+rx-cut,y-ry);
    CT.lineTo(x+rx,y-ry+cut);
    CT.lineTo(x+rx,y+ry-cut);
    CT.lineTo(x+rx-cut,y+ry);
    CT.lineTo(x-rx+cut,y+ry);
    CT.lineTo(x-rx,y+ry-cut);
    CT.lineTo(x-rx,y-ry+cut);
    CT.closePath();
    CT.fill();
    CT.fillStyle='rgba(255,255,255,.16)';
    CT.beginPath();
    CT.moveTo(x-rx*.45,y-ry*.55);
    CT.lineTo(x+rx*.35,y-ry*.55);
    CT.lineTo(x+rx*.12,y-ry*.08);
    CT.lineTo(x-rx*.55,y-ry*.08);
    CT.closePath();
    CT.fill();
    if(hr<1){CT.fillStyle='rgba(0,0,0,.4)';CT.fillRect(bx,Math.round(y+h/2+2),w,3);CT.fillStyle='#7DF9AA';CT.fillRect(bx,Math.round(y+h/2+2),Math.round(w*hr),3);}
  }
  CT.restore();
}

function drawDrop(d){
  if(d.kind==='coin'){
    const p=Math.sin(G.fr*.18+d.phase)*2;
    CT.fillStyle='rgba(255,224,102,.18)';CT.beginPath();CT.arc(d.x,d.y+p*.2,11,0,Math.PI*2);CT.fill();
    CT.fillStyle='#FFE066';CT.beginPath();CT.arc(d.x,d.y+p*.2,7,0,Math.PI*2);CT.fill();
    CT.strokeStyle='#FFF3B0';CT.lineWidth=1.5;CT.stroke();
    CT.fillStyle='#5a4300';CT.font='bold 9px monospace';CT.textAlign='center';CT.fillText('$',d.x,d.y+3+p*.2);
    return;
  }
  if(d.kind==='effect'){
    const p=Math.sin(G.fr*.18+d.phase)*2;
    CT.fillStyle=d.color+'22';CT.beginPath();CT.arc(d.x,d.y+p*.2,11,0,Math.PI*2);CT.fill();
    CT.strokeStyle=d.color;CT.lineWidth=1.5;CT.beginPath();CT.arc(d.x,d.y+p*.2,8,0,Math.PI*2);CT.stroke();
    CT.fillStyle=d.color;CT.font='bold 8px monospace';CT.textAlign='center';CT.fillText(d.icon,d.x,d.y+3+p*.2);
    return;
  }
  const rc=RAR[d.rarity].c,p=Math.sin(G.fr*.15+d.phase)*2;
  CT.fillStyle=rc+'33';CT.fillRect(Math.round(d.x-10),Math.round(d.y-10+p*.1),20,20);
  CT.strokeStyle=rc;CT.lineWidth=1.5;CT.strokeRect(Math.round(d.x-10),Math.round(d.y-10+p*.1),20,20);
  CT.fillStyle=rc;CT.font='bold 10px monospace';CT.textAlign='center';CT.fillText('#',d.x,d.y+4+p*.1);
}

function makeCoinDrop(x,y,value){
  return{kind:'coin',x,y,value,phase:Math.random()*Math.PI*2,vy:.9};
}

// 效果掉落池：移除清弹，新增超级磁铁
const EFFECT_POOL=[
  {kind:'expBoost',label:'经验x2',color:'#7DF9AA',icon:'E'},
  {kind:'goldBoost',label:'金币x2',color:'#FFE066',icon:'G'},
  {kind:'shield',label:'+1护盾',color:'#54A0FF',icon:'S'},
  {kind:'superMagnet',label:'超级磁铁',color:'#c084fc',icon:'M'},
];
function makeEffectDrop(x,y){
  const fx=EFFECT_POOL[Math.floor(Math.random()*EFFECT_POOL.length)];
  return{kind:'effect',effect:fx.kind,label:fx.label,color:fx.color,icon:fx.icon,x,y,phase:Math.random()*Math.PI*2,vy:.85};
}
function applyEffectDrop(d){
  if(d.effect==='expBoost'){
    G.expBoost=600;
    showToast('获得临时效果: 10秒经验x2');
  }else if(d.effect==='goldBoost'){
    G.goldBoost=600;
    showToast('获得临时效果: 10秒金币x2');
  }else if(d.effect==='shield'){
    G.shield+=1;
    showToast('获得临时效果: +1护盾');
  }else if(d.effect==='superMagnet'){
    G.superMagnet=600;
    // 视觉爆炸效果
    for(let i=0;i<24;i++){const a=i/24*Math.PI*2;parts.push({x:PL.x+Math.cos(a)*30,y:PL.y+Math.sin(a)*30,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:1.2,color:'#c084fc',sz:3,glow:true,txt:null});}
    showToast('超级磁铁！10秒全屏吸附！');
  }
}
function damageEnemy(enemy,amount){
  if(!enemy||amount<=0)return false;
  enemy.hp=Math.max(0,enemy.hp-amount);
  return enemy.hp<=0;
}

// ═══ 主游戏循环 ═══
function tick(ts){
  RID=requestAnimationFrame(tick);

  if(!G||G.state!=='playing')return;

  const dt=Math.min((ts-G.lt)/16.67,3);G.lt=ts;G.fr++;
  if(G.expBoost>0)G.expBoost=Math.max(0,G.expBoost-dt);
  if(G.goldBoost>0)G.goldBoost=Math.max(0,G.goldBoost-dt);
  if(G.superMagnet>0)G.superMagnet=Math.max(0,G.superMagnet-dt);

  // 回血套
  if(SA('回血套')){G.sRT+=dt;if(G.sRT>300){G.sRT=0;G.hp=Math.min(G.maxHp,G.hp+Math.round(G.maxHp*.03));}}

  // 玩家移动
  PL.x+=(G.mx-PL.x)*.92*dt;PL.y+=(G.my-PL.y)*.92*dt;
  const dx0=G.mx-PL.x,dy0=G.my-PL.y;
  if(Math.abs(dx0)>1||Math.abs(dy0)>1){PL.wf+=dt*2;PL.dir=dx0>=0?1:-1;}
  PL.x=Math.max(14,Math.min(W-14,PL.x));PL.y=Math.max(20,Math.min(H-20,PL.y));
  if(PL.inv>0)PL.inv-=dt;

  const wm=wMods(),wb=wsB();
  function cleanupDeadEnemies(){
    for(let i=enemies.length-1;i>=0;i--){
      if(enemies[i].hp<=0)killE(enemies[i],i);
    }
  }

  // 激光逻辑
  if(wm.lm){
    G.laserCool-=dt;
    if(G.laserCool<=0&&!G.laserActive){
      G.laserActive=true;
      G.laserTimer=0;
      G.laserDmgTimer=0;
      const laserCount=Math.min(getMS(),enemies.length);
      G.laserTids=[...enemies].sort((a,b)=>a.y-b.y).slice(0,laserCount).map(e=>e.id);
    }
    if(G.laserActive){
      G.laserTimer+=dt;
      G.laserDmgTimer+=dt;
      const dmgInterval=getFireI();
      const maxDuration=300;
      
      if(G.laserDmgTimer>=dmgInterval){
        G.laserDmgTimer-=dmgInterval;
        G.laserTids.forEach((tid,idx)=>{
          let t=enemies.find(e=>e.id===tid);
          if(!t){
            const availableEnemies=enemies.filter(e=>!G.laserTids.includes(e.id));
            if(availableEnemies.length>0){
              t=availableEnemies.sort((a,b)=>a.y-b.y)[0];
              G.laserTids[idx]=t.id;
            }else{
              G.laserTids[idx]=null;
            }
          }
          if(t){
            const dmg=getAtk()*2;
            t.hp=Math.max(0,t.hp-dmg);
            spP(t.x,t.y,eq['武器']?RAR[eq['武器'].rarity].c:'#7DF9AA',2);
            if(t.hp===0){
              const eidx=enemies.indexOf(t);
              if(eidx>=0)killE(t,eidx);
              G.laserTids[idx]=null;
            }
          }
        });
      }
      
      G.laserTids=G.laserTids.filter(id=>id!==null);
      
      if(G.laserTimer>=maxDuration||G.laserTids.length===0){
        G.laserActive=false;
        G.laserCool=wm.lc;
      }
    }
  }else{
    G.laserActive=false;
  }

  // 射击
  if(G.sCool<=0&&enemies.length>0&&!wm.lm){
    const wc=eq['武器']?RAR[eq['武器'].rarity].c:'#7DF9AA';
    const a=11;
    const n=getMS();
    const speedBonus = Math.max(0, 10 - getFireI());
    let bulletSpeed = a + speedBonus + (wb.sp||0)*1.2;
    let dmg = getAtk();
    let isCannon = false;
    let explosionDmg = 0;

    if(wm.cm){
      bulletSpeed = a * 0.75 + speedBonus + (wb.sp||0)*1.4;
      dmg = getAtk() * 3;
      isCannon = true;
      explosionDmg = getAtk() * 0.5;
    }

    const tgt=enemies.reduce((a,b)=>a.y>b.y?a:b);
    const sp2=9,off=(n-1)*sp2/2;
    for(let i=0;i<n;i++){
      const spread=wm.es>0?(i-(n-1)/2)*0.1:0;
      const angle=(n-1>0?(i-(n-1)/2)*0.15:0);
      const vx = Math.sin(spread)*bulletSpeed;
      const vy = isCannon ? bulletSpeed : -bulletSpeed;
      pB.push({
        x:PL.x-off+i*sp2,y:PL.y-14,
        vx,vy,
        dmg,crit:getCrit(),cd:getCritD(),
        pr:SK.pr,ph:0,col:wc,
        cannon:isCannon,missile:isCannon,tid:tgt.id,sp:wb.sp||0,
        explosionDmg, speed: bulletSpeed
      });
    }
    G.sCool=getFireI();
  }
  if(G.sCool>0)G.sCool-=dt;

  cZ=cZ.filter(z=>{z.life-=dt;if(z.life<=0)return false;z.t-=dt;if(z.t<=0){z.t=60;enemies.forEach(e=>{if(Math.hypot(e.x-z.x,e.y-z.y)<z.r){damageEnemy(e,getAtk()*.2);spP(e.x,e.y,'#FF9900',2);}});cleanupDeadEnemies();}return true;});

  // 玩家子弹
  pB=pB.filter(b=>{
    if(b.missile||b.cannon){
      const t=enemies.find(e=>e.id===b.tid);
      if(t){
        const dx=t.x-b.x,dy=t.y-b.y,d=Math.hypot(dx,dy);
        if(d>4){
          const speed=b.speed;
          const targetVX=dx/d*speed;
          const targetVY=dy/d*speed;
          b.vx += (targetVX - b.vx)*0.18;
          b.vy += (targetVY - b.vy)*0.18;
        }
      }
    }
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.y<-20||b.y>H+20||b.x<-20||b.x>W+20)return false;
    let used=false;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(Math.abs(b.x-e.x)<e.w/2+2&&Math.abs(b.y-e.y)<e.h/2+2){
        const ic=Math.random()<b.crit,dmg=Math.round(b.dmg*(ic?b.cd:1));
        damageEnemy(e,dmg);spP(b.x,b.y,ic?'#FFE066':e.col,ic?7:4);
        if(ic)parts.push({x:e.x,y:e.y-e.h/2-5,vx:0,vy:-1.2,life:.9,color:'#FFE066',sz:2,glow:false,txt:'暴!'+dmg});
        if(b.cannon){
          const explosionRadius = 60;
          enemies.forEach(oe=>{
            if(Math.hypot(oe.x-e.x,oe.y-e.y)<explosionRadius){
              damageEnemy(oe,b.explosionDmg);
              spP(oe.x,oe.y,'#FF9900',4);
            }
          });
          cZ.push({x:e.x,y:e.y,r:explosionRadius,life:3,t:0});
        }
        if(b.aoe)enemies.forEach(oe=>{if(oe.id!==e.id&&Math.hypot(oe.x-e.x,oe.y-e.y)<b.aoe){damageEnemy(oe,dmg*.5);spP(oe.x,oe.y,b.col||'#c084fc',4);}});
        if(b.sp>0&&enemies.length>1){for(let s2=0;s2<b.sp;s2++){const a=s2/b.sp*Math.PI*2;pB.push({x:b.x,y:b.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10,dmg:b.dmg*.5,crit:b.crit,cd:b.cd,pr:0,ph:0,col:b.col,cannon:false,sp:0,aoe:b.aoe||0});}}
        if(e.hp<=0){killE(e,i);if(b.pr<=0||b.ph>=b.pr){used=true;break;}b.ph++;}
        else if(b.pr<=0){used=true;break;}
      }
    }
    return !used;
  });

  function killE(e,idx){
    spP(e.x,e.y,e.col,e.shape==='boss'?40:14);
    if(SA('爆炸套'))enemies.forEach(oe=>{if(oe.id!==e.id&&Math.hypot(oe.x-e.x,oe.y-e.y)<70){damageEnemy(oe,getAtk()*3);spP(oe.x,oe.y,'#fb923c',5);}});
    playerExp += Math.round(e.exp*(G.expBoost>0?2:1));
    drops.push(makeCoinDrop(e.x,e.y,Math.round(e.cn*getCB()*(G.goldBoost>0?2:1))));G.wLeft--;
    if(e.shape==='boss'){
      P.clearedWave=Math.max(P.clearedWave,G.wave);
      for(let i=0;i<5;i++){const g=rollGear(0,G.wave,true);drops.push({...g,x:e.x+(Math.random()-.5)*60,y:e.y+(Math.random()-.5)*30,phase:Math.random()*Math.PI*2,vy:.8});}
      for(let i=0;i<4;i++)drops.push(makeCoinDrop(e.x+(Math.random()-.5)*36,e.y+(Math.random()-.5)*24,Math.max(1,Math.round(e.cn*getCB()*.35*(G.goldBoost>0?2:1)))));
      if(SA('护盾套'))G.shield+=3;
      showToast('BOSS倒下！5件装备掉落');
    }else if(Math.random()<.022+G.wave*.001){
      drops.push({...rollGear(0,G.wave,false),x:e.x,y:e.y,phase:Math.random()*Math.PI*2,vy:1});
    }
    if(Math.random()<0.08)drops.push(makeEffectDrop(e.x+(Math.random()-.5)*18,e.y+(Math.random()-.5)*18));
    enemies.splice(idx,1);
    cleanupDeadEnemies();
  }

  // 怪物移动
  enemies.forEach(e=>{
    if(!e.stopped){e.y+=e.spd*dt;if(e.y>=e.stopY)e.stopped=true;}
    else{if(e.shape==='boss'||e.shape==='brute'||e.shape==='ufo'){e.x+=Math.sin(G.fr*.015+e.mvPh)*1.8*dt;e.x=Math.max(e.w/2+4,Math.min(W-e.w/2-4,e.x));}else{e.x+=e.dx*dt;if(e.x<e.w/2+4||e.x>W-e.w/2-4)e.dx*=-1;}}
    e.sT-=dt;if(e.sT<=0){fireE(e);e.sT=e.sI*(0.75+Math.random()*.4);}
    if(e.y>H+30){G.wLeft--;enemies.splice(enemies.indexOf(e),1);}
  });

  // 掉落物 - 超级磁铁时吸附范围为全屏
  const mag=G&&G.superMagnet>0?600:SK.mag*60;
  drops=drops.filter(d=>{
    d.y+=d.vy*dt;if(d.y>H+30)return false;
    if(mag>0){const ddx=PL.x-d.x,ddy=PL.y-d.y,dd=Math.hypot(ddx,ddy);if(dd<mag){const spd=G.superMagnet>0?8:3.5;d.x+=ddx/dd*spd*dt;d.y+=ddy/dd*spd*dt;}}
    if(Math.abs(d.x-PL.x)<18&&Math.abs(d.y-PL.y)<18){
      if(d.kind==='coin'){
        P.gold+=d.value;
        showToast('+'+d.value+' 金币');
        spP(d.x,d.y,'#FFE066',8);
        updHUD();
        return false;
      }
      if(d.kind==='effect'){
        applyEffectDrop(d);
        spP(d.x,d.y,d.color,10);
        updHUD();
        return false;
      }
      bag.push(ensureGearState({name:d.name,type:d.type,rarity:d.rarity,stats:d.stats,baseStats:d.baseStats,lv:d.lv,suit:d.suit,wsuit:d.wsuit,sub:d.sub,id:d.id}));autoProc(G.wave);showToast(RAR[d.rarity].n+' '+d.name);spP(d.x,d.y,RAR[d.rarity].c,10);return false;
    }
    return true;
  });

  // 敌方子弹碰撞
  if(PL.inv<=0){
    eB=eB.filter(b=>{
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      if(b.x<-10||b.x>W+10||b.y<-10||b.y>H+10)return false;
      if(Math.abs(b.x-PL.x)<10&&Math.abs(b.y-PL.y)<14){
        if(G.shield>0){G.shield--;spP(b.x,b.y,'#54A0FF',6);PL.inv=40;showToast('护盾！');return false;}
        const raw=(b.r?b.r*3:10)*(b.dm||1),red=Math.round(raw*(1-getDef()));
        G.hp-=red;spP(PL.x,PL.y,'#FF6B6B',8);PL.inv=80;
        if(SA('护盾套')&&G.shield===0)G.shield=3;
        updHUD();if(G.hp<=0){endGame();return false;}showToast('-'+red+'HP');return false;
      }
      return true;
    });
  }else{eB.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;});eB=eB.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);}

  // 波次管理
  if(G.wState==='spawning'){
    spT-=dt;
    if(spT<=0&&wQ.length>0){const bs=G.wave%5===0?1:Math.min(6,wQ.length);for(let i=0;i<bs&&wQ.length>0;i++)spE(wQ.shift());spT=G.wave%5===0?40:12;}
    if(wQ.length===0)G.wState='waiting';
  }
  if(G.triggerWave>0&&G.triggerWave%5!==0&&G.waveSizes[G.triggerWave]&&G.maxWaveStarted===G.triggerWave&&aliveInWave(G.triggerWave)<=Math.floor(G.waveSizes[G.triggerWave]/2)){
    G.maxWaveStarted=G.triggerWave+1;
    startWave(G.maxWaveStarted);
    G.triggerWave=G.maxWaveStarted;
  }
  if((G.wState==='waiting'||G.wState==='spawning')&&enemies.length===0&&G.wLeft<=0&&wQ.length===0){
    if(SK.regen>0)G.hp=Math.min(getMxHp(),G.hp+SK.regen*15);
    G.waveSizes={};
    showWB('波次 '+G.wave+' 清除！');updHUD();G.wState='pause';G.wPause=18;
  }
  if(G.wState==='pause'){
    G.wPause-=dt;
    if(G.wPause<=0){
      G.wTotal=0;G.wLeft=0;
      G.maxWaveStarted=G.wave+1;
      G.triggerWave=G.maxWaveStarted;
      startWave(G.maxWaveStarted);
    }
  }

  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.024;});parts=parts.filter(p=>p.life>0);

  // ── 绘制 ──
  drawBg(dt);
  cZ.forEach(z=>{CT.strokeStyle='rgba(255,150,0,'+Math.min(.8,z.life*.3)+')';CT.lineWidth=2;CT.beginPath();CT.arc(z.x,z.y,z.r,0,Math.PI*2);CT.stroke();CT.fillStyle='rgba(255,150,0,.05)';CT.beginPath();CT.arc(z.x,z.y,z.r,0,Math.PI*2);CT.fill();});
  drops.forEach(drawDrop);enemies.forEach(drawE);
  if(G.laserActive&&G.laserTids&&G.laserTids.length>0){
    const lc=eq['武器']?RAR[eq['武器'].rarity].c:'#7DF9AA';
    CT.strokeStyle=lc;CT.lineWidth=3+Math.sin(G.fr*.3);
    G.laserTids.forEach((tid,idx)=>{
      const t=enemies.find(e=>e.id===tid);
      if(t){
        CT.beginPath();CT.moveTo(PL.x,PL.y-14);CT.lineTo(t.x,t.y);CT.stroke();
      }
    });
  } else if(wm.lm && G.laserCool <= 0 && enemies.length > 0){
    const t=enemies.reduce((a,b)=>Math.hypot(a.x-PL.x,a.y-PL.y) < Math.hypot(b.x-PL.x,b.y-PL.y) ? a : b);
    const lc=eq['武器']?RAR[eq['武器'].rarity].c:'#7DF9AA';
    CT.strokeStyle=lc+'44';CT.lineWidth=1.8;
    CT.beginPath();CT.moveTo(PL.x,PL.y-14);CT.lineTo(t.x,t.y);CT.stroke();
  }
  pB.forEach(b=>{
    if(b.cannon){CT.fillStyle='#FF9900';CT.beginPath();CT.arc(b.x,b.y,6,0,Math.PI*2);CT.fill();return;}
    const wc=b.col||(eq['武器']?RAR[eq['武器'].rarity].c:'#7DF9AA');
    if(b.big){CT.globalAlpha=.7;CT.fillStyle=wc;CT.beginPath();CT.arc(b.x,b.y,9,0,Math.PI*2);CT.fill();CT.globalAlpha=1;CT.fillStyle=wc;CT.beginPath();CT.arc(b.x,b.y,5,0,Math.PI*2);CT.fill();}
    else{CT.fillStyle=wc;CT.fillRect(Math.round(b.x-2),Math.round(b.y-7),4,8);}
  });
  eB.forEach(b=>{CT.fillStyle=b.color||'#FF6B6B';CT.beginPath();CT.arc(b.x,b.y,b.r||3,0,Math.PI*2);CT.fill();});
  parts.forEach(p=>{
    CT.globalAlpha=Math.max(0,p.life);
    if(p.txt){CT.fillStyle=p.color;CT.font='bold 10px monospace';CT.textAlign='center';CT.fillText(p.txt,p.x,p.y);CT.globalAlpha=1;return;}
    if(p.glow){CT.shadowBlur=6;CT.shadowColor=p.color;}
    CT.fillStyle=p.color;CT.fillRect(Math.round(p.x),Math.round(p.y),Math.round(p.sz),Math.round(p.sz));
    CT.shadowBlur=0;CT.globalAlpha=1;
  });
  drawPL();

  // HUD
  const wD=G.wTotal-G.wLeft,wP=G.wTotal>0?Math.min(1,wD/G.wTotal):0;
  CT.fillStyle='rgba(0,0,0,.4)';CT.fillRect(6,6,W-12,5);
  CT.fillStyle=G.wave%5===0?'hsl('+(G.fr*3%360)+',80%,55%)':'#378ADD';CT.fillRect(6,6,Math.round((W-12)*wP),5);
  CT.fillStyle='rgba(150,150,255,.5)';CT.font='9px monospace';CT.textAlign='right';CT.fillText('波次'+G.wave+'('+wD+'/'+G.wTotal+')',W-6,20);
  if(wm.lm){const lp=Math.max(0,1-G.laserCool/wm.lc);CT.fillStyle='rgba(0,0,0,.4)';CT.fillRect(6,H-22,60,4);CT.fillStyle=G.laserCool<=0?'#7DF9AA':'#1a3a1a';CT.fillRect(6,H-22,Math.round(60*lp),4);}
  if(G.expBoost>0){CT.fillStyle='#7DF9AA';CT.font='9px monospace';CT.textAlign='left';CT.fillText('经验x2 '+(G.expBoost/60).toFixed(1)+'s',6,32);}
  if(G.goldBoost>0){CT.fillStyle='#FFE066';CT.font='9px monospace';CT.textAlign='left';CT.fillText('金币x2 '+(G.goldBoost/60).toFixed(1)+'s',6,44);}
  if(G.superMagnet>0){CT.fillStyle='#c084fc';CT.font='9px monospace';CT.textAlign='left';CT.fillText('超磁铁 '+(G.superMagnet/60).toFixed(1)+'s',6,56);}
  let sy=H-32;Object.entries(AS).forEach(([sn,sd])=>{if(SA(sn)){CT.fillStyle=sd.c+'bb';CT.font='9px monospace';CT.textAlign='right';CT.fillText('+'+sn,W-6,sy);sy-=12;}});
  CT.strokeStyle='rgba(125,249,170,.4)';CT.lineWidth=1;CT.beginPath();CT.arc(G.mx,G.my,6,0,Math.PI*2);CT.stroke();CT.beginPath();CT.moveTo(G.mx-10,G.my);CT.lineTo(G.mx+10,G.my);CT.stroke();CT.beginPath();CT.moveTo(G.mx,G.my-10);CT.lineTo(G.mx,G.my+10);CT.stroke();
  if(G.fr%28===0)updHUD();

  // 人物升级检查
  while(playerExp >= expToNext){
    playerLevel++;
    playerExp -= expToNext;
    P.sp++;
    expToNext = 50 + (playerLevel - 1) * 100;
    showToast('升级到 Lv.' + playerLevel + '，技能点+1');
    updHUD();
  }
}

function endGame(){
  stopLoop();
  G.state='dead';
  const bN=Math.floor(P.clearedWave/5);
  const rebirthGain=(bN>=1?Math.pow(bN,3):0)+playerLevel;
  CT.fillStyle='rgba(0,0,0,.82)';CT.fillRect(0,0,W,H);
  CT.fillStyle='#FF6B6B';CT.font='bold 26px monospace';CT.textAlign='center';CT.fillText('GAME OVER',W/2,H/2-50);
  CT.fillStyle='#FFE066';CT.font='14px monospace';CT.fillText('等级: '+playerLevel+'  经验: '+playerExp+'  技能点: '+P.sp,W/2,H/2-16);
  CT.fillStyle='#7DF9AA';CT.font='12px monospace';CT.fillText('金币: '+Math.round(P.gold)+'  波次: '+G.wave,W/2,H/2+6);
  CT.fillStyle='#c084fc';CT.font='11px monospace';CT.fillText('转生币: '+P.rc+'（可获得+'+rebirthGain+'）',W/2,H/2+26);
  const ctrls=document.getElementById('ctrls');
  ctrls.innerHTML='<button onclick="doRebirth('+rebirthGain+')">转生 +'+rebirthGain+'币</button><button id="btn" onclick="startGame()">再来一次</button>';
  updHUD();
}

function doRebirth(gain){
  P.rc += gain;
  P.clearedWave = 0;
  P.sp = 0;
  SK={atk:0,def:0,hpUp:0,fr:0,ms:0,pr:0,regen:0,crit:0,mag:0,shield:0};
  playerLevel=0;playerExp=0;expToNext=50;
  initWeapons();
  eq = {武器:null, 护甲:null, 头盔:null, 饰品:null};
  document.getElementById('ctrls').innerHTML = '<button id="btn" onclick="startGame()">开始游戏</button><button onclick="ST(\"minion\")">仆从</button><button onclick="ST(\"gear\")">装备</button>';
  updHUD();
  ST('game');
}

function giveUp(){
  if(!G||G.state!=='playing'){showToast('非战斗状态');return;}
  showToast('战斗放弃！');
  G.hp=0;
  endGame();
}

function runSkip(target,doneCB){
  const el=document.getElementById('skipOv');el.className='show';
  let w=1,tG=0,tS=0;const steps=Math.max(1,target-1);
  const iv=setInterval(()=>{
    if(w>=steps){clearInterval(iv);document.getElementById('skipProg').style.width='100%';setTimeout(()=>{el.className='';G.wave=target-1;G.wState='pause';G.wPause=8;if(doneCB)doneCB();},350);return;}
    w++;document.getElementById('skipProg').style.width=Math.round((w-1)/steps*100)+'%';
    document.getElementById('skipTxt').textContent='跳关: 波次 '+w+' / '+target;
    const c=Math.round(w*12),s=Math.round(w*32);tG+=c;tS+=s;P.gold+=c;
    if(w%5===0)drops.push({...rollGear(0,w,true),x:W/2+(Math.random()-.5)*100,y:H/2,phase:Math.random()*Math.PI*2,vy:.5});
    document.getElementById('skipRew').textContent='+'+tG+'金 +'+Math.round(tS)+'分';
  },Math.max(18,550/steps));
}

function startGame(){
  stopLoop();
  document.getElementById('cardOv').className='';
  document.getElementById('skipOv').className='';

  G={state:'playing',score:0,wave:0,hp:0,maxHp:0,shield:getBaseShield(),fr:0,lt:0,mx:W/2,my:H-70,sCool:0,wState:'pause',wPause:12,wLeft:0,wTotal:0,sRT:0,laserCool:0,laserActive:false,laserTimer:0,laserTids:[],laserDmgCools:[],waveSizes:{},maxWaveStarted:0,triggerWave:0,expBoost:0,goldBoost:0,superMagnet:0};
  G.maxHp=getMxHp();G.hp=G.maxHp;
  cZ=[];wQ=[];spT=0;
  PL={x:W/2,y:H-70,inv:0,wf:0,dir:1};
  pB=[];eB=[];enemies=[];parts=[];drops=[];
  MT.forEach(k=>mCl[k]=0);
  document.getElementById('btn').style.display='none';
  document.getElementById('ctrls').innerHTML='<button onclick="giveUp()" style="color:#FF6B6B">放弃</button>';
  ST('game');updHUD();

  const target=P.clearedWave>=5?Math.floor(P.clearedWave/5)*5+1:0;
  if(target>1){
    startLoop();
    runSkip(target,()=>{
      G.wave=target-1;
      G.maxWaveStarted=G.wave;
      G.triggerWave=G.wave;
      G.wState='pause';
      G.wPause=8;
    });
  }else{
    startLoop();
  }
}

    const card=document.createElement('div');
    card.style='background:#0a0a14;border:1px solid '+(maxed?'#1f3f2a':'#1a1a2a')+';border-radius:5px;padding:8px';
    card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="color:#7DF9AA;font-size:15px">'+meta.ic+'</span><span style="color:'+(maxed?'#4ade80':'#666')+';font-size:10px">Lv.'+rank+(cap<Infinity?'/'+cap:'')+'</span></div>'
      +'<div style="color:#eee;font-size:11px;font-weight:500">'+meta.n+'</div>'
      +'<div style="color:#555;font-size:9px;line-height:1.5;margin:4px 0 6px">'+meta.d+'</div>'
      +'<button onclick="buySkill(\''+key+'\')" style="width:100%;font-size:10px;padding:4px 6px;color:'+(maxed?'#4ade80':P.sp>=cost?'#FFE066':'#666')+'">'+(maxed?'已满级':'购买('+cost+'点)')+'</button>';
    grid.appendChild(card);
  });
  rp.appendChild(grid);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity=0,1900);}
function showWB(txt){const b=document.getElementById('wb');b.innerHTML=txt;b.style.opacity=1;clearTimeout(b._t);b._t=setTimeout(()=>b.style.opacity=0,2200);}
function updHUD(){
  const mh=getMxHp();if(G){G.maxHp=mh;G.hp=Math.max(0,Math.min(G.hp,mh));}
  const hp=G?G.hp:mh,pct=Math.round(hp/mh*100);
  document.getElementById('hpf').style.width=pct+'%';document.getElementById('hpf').style.background=pct>60?'#4ade80':pct>30?'#FFE066':'#FF6B6B';
  document.getElementById('hpt').textContent=Math.round(hp)+'/'+mh;
  document.getElementById('tc').textContent=Math.round(P.gold);document.getElementById('rc').textContent=P.rc;
  document.getElementById('sc').textContent='Lv.'+playerLevel+' Exp:'+playerExp+'/'+expToNext+' SP:'+P.sp;document.getElementById('hi').textContent='';document.getElementById('wv').textContent=G?G.wave:1;
}

function syncPointer(clientX,clientY){
  if(!G)return;
  const r=CV.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
  G.mx=(clientX-r.left)*sx;
  G.my=(clientY-r.top)*sy;
}

CV.addEventListener('mousemove',e=>{syncPointer(e.clientX,e.clientY);});
CV.addEventListener('touchstart',e=>{
  if(!G||!e.touches.length)return;
  e.preventDefault();
  syncPointer(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
CV.addEventListener('touchmove',e=>{
  if(!G||!e.touches.length)return;
  e.preventDefault();
  syncPointer(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
CV.addEventListener('touchend',e=>{if(e.cancelable)e.preventDefault();},{passive:false});

initStars();drawBg(1);
CT.fillStyle='#7DF9AA';CT.font='bold 20px monospace';CT.textAlign='center';CT.fillText('像素射击战 v6',W/2,H/2-32);
CT.fillStyle='#555';CT.font='12px monospace';CT.fillText('技能点养成 | 开局无初始武器 | 转生币抽卡',W/2,H/2);
CT.fillStyle='#FFE066';CT.font='10px monospace';CT.fillText('金币拾取 | 半波连刷 | 超级磁铁全屏吸附',W/2,H/2+22);
updHUD();

initWeapons();
</script></body></html>
